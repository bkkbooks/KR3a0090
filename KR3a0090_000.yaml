body:
  text: 張子抄釋儒家類提要臣等謹案張子抄釋六卷明吕柟撰是編摘録張子之書以西銘東銘為冠次正蒙十九篇次經學理窟十一篇次語録次文集而終以行狀亦每條各附以釋如周子抄釋之例首有嘉靖辛丑柟自序稱張子書存者止二銘正䝉理窟語録文集而文集又未完止得二卷於馬伯循氏諸書皆言簡意實出於精思力行之後顧其書散見漫行渙無統紀而一義重出亦容有之暇嘗稡抄成帙注釋數言畧發大㫖以便初學觀省葢其謫官解州時作也案虞集作吳澄行状稱澄校正張子之書挈東西銘於篇首而正䝉次之大意與柟此本合澄本今未見柟此本簡汰不茍較世所行張子全書亦為精要矣乾隆四十五年七月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀張子抄釋原序横渠張子書甚多今其存者止二銘正䝉理窟語録及文集而文集又未完止得二卷於三原馬伯循氏然諸書皆言簡意實出於精思力行之後至論仁孝神化政教禮樂蓋自孔孟後未有能如是切者也顧其書散見漫行涣無統紀而一義重出亦容有之暇嘗稡抄成帙注釋數言略發大㫖以便初學者之觀省謫解之第三年廵按潛江初公恐四方無是本也命刻諸解梁書院以廣布云嘉靖五年三月辛丑後學髙陵吕柟序

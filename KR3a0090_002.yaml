body:
  text: 張子抄釋卷二明吕柟撰正蒙中正第十中正然後貫天下之道此君子之所以大居正也蓋得正則得所止得所止則可以𢎞而致於大樂正子顔淵知欲仁矣樂正子不致其學足以為善人信人志於仁無惡而已顔淵好學不倦合仁與智具體聖人獨未至聖人之止爾釋學能換胎移骨大中至正之極文必能致其用約必能感而通未至於此其視聖人恍惚前後不可為之像此顔子之嘆乎釋博文約禮聖學無餘事高明不可窮博厚不可極則中道不可識蓋顔子之嘆也君子之道成身成性以為功者也未至於聖皆行而未成之地爾釋成性即成身大而未化未能有其大化而後能有其大釋化能兼大知德以大中為極可謂知至矣擇中庸而固執之乃至之之漸也惟知學然後能勉能勉然後日進而不息可期矣釋惟知學難知學自會不息極其大而後中可求止其中而後大可有釋大有中中兼大大亦聖之任雖非清和一體之偏猶未忘於勉而大爾若聖人則性與天道無所勉焉釋無所勉者化也不得已當為而為之雖殺人皆義也有心為之雖善皆意也正已而物正大人也正已而正物猶不免有意之纍也有意為善利之也假之也無意為善性之也由之也有意在善且為未盡况有意於未善耶仲尼絶四自始學至成德竭兩端之教也釋但仲尼無四者之盡耳所以與天同運天理一貫則無意必固我之鑿意必固我一物存焉非誠也四者盡去則直養而無害矣釋誠無事誠之者必有事焉妄去然後得所止得所止然後得所養而進於大矣無所感而起妄也感而通誠也計度而知昏也不思而得素也事豫則立必有教以先之盡教之善必精義以研之精義入神然後立斯立動斯和矣釋只是熟博文以集義集義以正經正經然後一以貫天下之道釋道不外乎經經者義之所成也義者文之所具也將窮理而不順理將精義而不徙義欲資深且習察吾不知其智也釋是謂不知而作君子於天下達善達不善無物我之私循理者共悅之不循理者共改之改之者過雖在人如在已不忘自訟共悅者善雖在已蓋取諸人而為必以與人焉善以天下不善以天下是謂達善達不善釋只是仁耳責己者當知天下國家無皆非之理故學至於不尤人學之至也釋如此方得道故夫子謂知我其天學者四失為人則失多好高則失寡不察則易苦難則止學者捨禮義則飽食終日無所猷為與下民一致所事不踰衣食之間燕遊之樂爾釋人能自省過其學便正且勇知至學之難易知德也知其美惡知人也知其人且知德故能教人使入德仲尼所以問同而答異以此釋知德者能自得也故能隨感而應洪鐘未嘗有聲由扣乃有聲聖人未嘗有知由問乃有知有如時雨之化者當其可乘其間而施之不待彼有求有為而後教之也釋亦有待求待為者道以德者運於物外使自化也故諭人者先其意而遜其志可也蓋志意兩言則志公而意私爾釋謂發初心便易有受教之心雖蠻貊可教為道既異雖黨類難相為謀釋只是要人信得真大人所存蓋必以天下為度故孟子教人雖貨色之欲親長之私達諸天下而後已釋只是有仁心故正蒙至當第十一至當之謂德百順之謂福德者福之基福者德之致無入而非百順故君子樂得其道釋得道者非以徼福浩然無害則天地合德照無偏繫則日月合明天地同流則四時合序酬酢不倚則鬼神合吉凶天地合德日月合明然後能無方體能無方體然後能無我釋無我亦當在先與無我語其成也禮器則藏諸身用無不利禮運云者語其達也禮器云者語其成也達與成體與用之道合體與用大人之事備矣禮器不泥於小者則無非禮之禮非義之義蓋大者器則出入小者莫非時中也子夏謂大德不踰間小德出入可也斯之謂爾釋大者不器也大德也禮運也小者小人儒也小德也禮器也未能如玉不足以成德未能成德不足以孚天下修己以安人修已而不安人不行乎妻子况可愾於天下釋只看如何成與修若解得成與修即天下可孚愾矣制行以已非所以同乎人必物之同者已則異矣必物之是者已則非矣釋只當責已能通天下之志者為能感人心聖人同乎人而無我故和平天下莫盛於感人心釋感人心易通天下之志難易簡理得則知幾知幾然後經可正天下達道五其生民之大經乎經正則道前定事豫立不疑其所行利用安身之要莫先焉釋至易簡理得處豈止知幾仁通極其性故能致養而靜以安義致行其知故能盡文而動以變釋仁能成性便渾然義則有斟酌條理耳義仁之動也流於義者於仁或傷仁體之常也過於仁者於義或害釋仁義並行而不悖大海無潤因暍者有潤至仁無恩因不足者有恩樂天安土所居而安不纍於物也釋無恩者不自以為恩也愛人然後能保其身能保其身則不擇地而安不擇地而安蓋所達者大矣大達於天則成性成身矣上達則樂天樂天則不怨下學則治已治已則無尤釋治已即樂天不知來物不足以利用不通晝夜未足以樂天聖人成其德不私其身故乾乾自強所以成之於天爾釋只是求合於天君子之道達諸天故聖人有所不能夫婦之智淆諸物故大人有所不與釋却恐分析太過匹夫匹婦非天之聰明不成其為人聖人天聰明之盡者爾釋人聰明皆天也大人者有容物無去物有愛物無徇物天之道然天以直養萬物代天而理物者曲成而不害其直斯盡道矣釋天道雖直養然中間洪纎高下亦自有曲析故聖人能盡其道似之志大則才大事業大故曰可大又曰富有志久則氣久德性久故曰可久又曰日新釋大便能久金和而玉節之則不過知運而貞一之則不流道所以可久可大以其肖天地而不離也與天地不相似其違道也逺矣釋即一隂一陽為道之意無不容然後盡屈伸之道至虛則無所不伸矣君子無所爭知幾於屈伸之感而已精義入神交伸不爭之地順莫甚焉利莫大焉釋容虛非求順利天下何思何慮明屈伸之變斯盡之矣釋既明屈伸之變思慮自免恭敬撙節退讓以明禮仁之至也愛道之極也釋以明禮為仁道可知其心矣將致用者幾不可緩思進德者徙義必精此君子所以立多凶多懼之地乾乾德業不少懈於趨時也釋幾一失必繆義一違必非故常自凶懼斯免知德之難言知之至也孟子謂我於辭命則不能又謂浩然之氣難言易謂不言而信存乎德行又以尚辭為聖人之道非知德達乎是哉釋只難言便可尋究正蒙作者第十二作者七人伏羲神農黃帝堯舜禹湯制法興王之道非有述於人者也釋七人亦有述而斟酌益損則在已故曰作以知人為難故不輕去未彰之罪以安民為難故不輕變未厭之君及舜而去之堯君德故得以厚吾終舜臣德故不敢不虔其始釋四凶之誅不誅堯舜皆是舜之孝湯武之武雖順逆不同其為不幸均矣明庶物察人倫然後能精義致用性其仁而行湯放桀有慚德而不敢赦執中之難也如是天下有道而已在人在已不見其間也立賢無方也如是立賢無方此湯所以公天下而不疑周公所以于其身望道而必吾見也釋此皆可以明舜湯武之心可願可欲雖聖人之知不越盡其才以勉焉而已故君子之道四雖孔子自謂未能博施濟衆修己安百姓堯舜病諸是知人能有願有欲不能窮其願欲釋君子小人皆有願欲其所不能窮者皆命也正蒙三十第十三三十器於禮非強立之謂也四十精義致用時措而不疑五十窮理盡性至天之命然不可自謂之至故曰知六十盡人物之性聲入心通七十與天同德不思不勉從容中道釋此非自孔子口氣説蓋舉其聖而言也常人之學日益而不自知也仲尼學行習察異於他人故自十五至於七十化而知裁其德進之盛者與釋惟心常在學常進故能自知非常人之孟浪過也從心莫如夢夢見周公志也不夢欲不踰矩也不願乎外也順之至也老而安死也故曰吾衰也久矣釋此雖非孔子口義却是孔子實事困而不知變民斯為下矣不待困而喻賢者之常也困之進人也為德辨為感速孟子謂人有德慧術知者存乎疢疾以此自古困於內無如舜困於外無如孔子以孔子之聖而下學於困則其蒙難正志聖德日躋必有人所不及知而天獨知之者矣故曰莫我知也夫知我者其天乎釋君子困則愈進小人困則退矣冉子請粟與原思為宰見聖人之用財也釋亦可觀一貫聖人於物無畔援雖佛肸南子茍以是心至教之在我爾不為己甚也如是釋此便見聖人不可及常人見此等亂矣仲尼應問雖叩兩端而竭然言必因人為變化所貴乎聖人之詞者以其知變化釋兩端只是一貫一貫只是變化放鄭聲逺佞人顔回為邦禮樂法度不必教之惟損益三代蓋所以告之也法立而能守則德可久業可大鄭聲佞人能使為邦者喪所守故放逺之釋自古無弊法有弊人以孔子之聖斟酌三代禮樂而猶懼鄭聲佞人况其他乎又無鄭聲佞人雖時之禮樂不害為治有鄭聲佞人雖先王禮樂亦無如之何天下有道則見無道則隱君子疾沒世而名不稱蓋士而懷居不可以為士必也去無道就有道遇有道而貧且賤君子恥之舉天下無道然後窮居獨善不見知而不悔中庸所謂惟聖者能之仲尼所以獨許顔回惟我與爾為有是也釋君子須求其實然後方可論世之有道無道而見隱仲由樂善故車馬衣裘喜與賢者共敝顔子樂進故願無伐善施勞聖人樂天故合內外而成其仁釋志立於此其後所就大小皆因之顔淵從師進德於孔子之門孟子命世修業於戰國之際此所以潛見之不同釋德業只是一事正蒙有德第十四有德者必有言能為有也志於仁而無惡能為無也釋有無不並行君子寧言之不顧不規規於非義之信寧身被困辱不徇人以非禮之恭寧孤立無助不失親於可賤之人三者知和而能以禮節之也與上有子之言文相屬而不相蒙者釋此發有子之未發德主天下之善善原天下之一善同歸治故王心一言必主德故王言大釋一德善便不雜不小言有教動有法書一有為宵有得息有養瞬有存釋六冇盡乎一身之學可謂造次必於仁矣君子於民導使為德而禁其為非不大望於愚者之道與禮謂道民以言禁民以行斯之謂爾釋此不可使知之之意聚百順以事君親故曰孝者畜也又曰畜君者好君也釋此以畜為聚事父母先意承志故能辨志意之異然後能教人釋志公而意私故也藝者日為之分義涉而不有過而不存故曰遊釋遊在外者也聊以適其內耳不穿窬義也謂非其有而取之曰盜亦義也惻隱仁也如天亦仁也故擴而充之不可勝用釋仁義皆有大小自養薄於人私也厚於人私也稱其才隨其等無驕吝之弊斯得之矣釋自養與其過於厚無寧過於薄困辱非憂取困辱為憂榮利非樂忘榮利為樂釋不當得者不可致已當得者不可有克己行法為賢樂已可法為聖聖與賢迹相近而心之所至有差焉辟世者依乎中庸沒世不遇而無嫌辟地者不懷居以害仁辟色者逺耻於將形辟言者免害於禍辱此為士清濁淹速之殊也辟世辟地雖聖人亦同然憂樂於中與賢者其次者為異故曰迹相近而心之所至者不同釋王仲淹亦言心迹判弓調而後求徑焉馬服而後求良焉士必慤而後知能者不慤而多能譬之豺狼不可近釋不慤而能無德之材貽害甚大谷神能象其聲而應之非謂能報以律吕之變也猶卜筮叩以是言則報以是物而已易所謂同聲相應是也王弼謂命吕者律語聲之變非此之謂也釋聲皆氣為無處無氣觸之即應正蒙有司第十五有司政之綱紀也始為政者未暇論其賢否必先正之求得賢才而後舉之釋得賢又有司之綱紀野九一而助郊之外助也國中什一使自賦郊門之內通謂之國中田不井授故使什而自賦其一也釋張子欲行井田之意雖於有司不忘道千乘之國不及禮樂刑政而云節用而愛人使民以時言能如是則法行不能如是則法不徒行禮樂刑政亦制數而已爾釋禮樂刑政皆在其事內富而不治不若貧而治大而不察不若小而察釋凡事只貴專精報者天下之利率德而致善有勸不善有阻皆天下之利也小人私己利於不治君子公物利於治釋勸阻皆是報正蒙大易第十六大易不言有無言有無諸子之陋也釋易言有者必慶吉易言無者必咎惡易語天地隂陽情偽至隱賾而不可惡也諸子馳騁説辭窮高極幽而知德者厭其言故言為非難使君子樂取之為貴釋易雖隱賾多為人事諸子則舍人事而間談易為君子謀不為小人謀故撰德於卦雖爻有小大及繫辭其爻必諭之以君子之義釋易有為小人謀小人能變則君子矣一物而兩體其太極之謂與隂陽天道象之成也剛柔地道法之效也仁義人道性之立也三才兩之莫不有乾坤之道釋乾坤作太極開物於幾先故曰知來明患而弭其故故曰藏往極數知來前知也前知其變有道術以通之君子所以措於民者遠矣釋前知只是至誠在人情物理上求乾之四德終始萬物迎之隨之不見其首尾然後推本而言當父母萬物釋亦統天首出之義六爻擬議各正性命故乾德旁通不失太和而利且貞也顔氏求龍德正中而未見其止故擇中庸得一善則拳拳服膺嘆夫子之忽焉前後也釋顔子嘆夫子之前後即是嘆天聖人用中之極不勉而中有大之極不為其大大人望之所謂絶塵而奔峻極于天不可階而升者也釋只是造於高明庸言庸行蓋天下經德達道大人之德施於是者溥矣天下之文明於是者著矣然非窮變化之神以時措之宜則或陷於非禮之禮非義之義此顔子所以求龍德正中乾乾進德思處其極未敢以方體之常安吾止也釋只是常存信謹惟君子為能與時消息順性命躬天德而誠行之也精義時措故能保合太和健利且貞孟子所謂始終條理集大成於聖智者與易曰大明終始六位時成時乘六龍以御天乾道變化各正性命保合太和乃利貞其此之謂乎釋只是仁熟成性則躋聖而位天德乾九二正位於內卦之中有君德矣而非上治也九五言上治者言乎天之德聖人之性故捨曰君而謂之天見大人德與位之皆造也釋君即天耳言天以見其極也造化之功發乎動畢達乎順形諸明養諸容載遂乎説潤勝乎健不匱乎勞終始乎止釋此亦八卦之序而錯言之辭各指其所之聖人之情也指之以趨時盡利順性命之理臻三極之道也能從之則不陷於凶悔矣所謂變動以利言者也然爻有攻取愛惡本情素動因生吉凶悔吝而不可變者乃所謂吉凶以情遷者也能深存繫辭所命則二者之動見矣又有義命當吉當凶當否當亨者聖人不使避凶趨吉一以貞勝而不顧如大人否亨有隕自天過涉滅頂凶無咎損益龜不克違及其命亂也之類三者情異不可察釋聖人不使避凶豈有此理若至此則凶不可避矣聖人能慎未然耳富有者大無外也日新者久無窮也顯其聚也隱其散也顯且隱幽明所以存乎象聚且散推蕩所以妙乎神釋象又比神著耳正蒙樂器第十七樂器有相周召之治與其有雅太公之志乎雅者正也直已而行正也故訊疾蹈厲者太公之事耶詩亦有雅亦正言而直歌之無隱諷譎諫之巧也釋人主孤立於上非相則何以聰明然必得周召者方可不然反害治故正譎皆為相之道象武武王初有天下象文王武功之舞歌維清以奏之成童學之大武武王沒嗣王象武王之功之舞歌武以奏之冠者舞之酌周公沒嗣王以武功之成由周公告其成於宗廟之歌也十三舞焉其釋此亦詩序之義可知他篇亦有據幽贊天地之道非聖人而能哉詩人謂后稷稼穡有相之道贊化育之一端也釋豈止贊其一端而已采枲耳議酒食女子所以奉賓祭享君親者足矣又思酌使臣之勞推及求賢審官王季文王之心豈是過歟釋此亦序義可知王季文王之化其家也甘棠初能使民不忍去中能使民不忍傷卒能使民知心敬而不瀆之以拜非善教寖明能取是於民哉釋拜從詩傳恐是九罭言王見周公當大其禮命則大人可致也釋此大夫諷王之意乎狼跋美周公不失其聖卒能感人心於和平也釋此説周公之忠聖亦盡蓋於赤舄上見之九疇次敘民資以生莫先天材故首曰五行君天下必先正已故次五事已正然後邦得而治故次八政政不時舉必昏故次五紀五紀明然後時措得中故次建皇極求大中不可不知權故次三德權必有疑故次稽疑可徵然後疑決故次庶徵福極徵然後可不勞而治故九以嚮勸終焉五為數中故皇極處之權過中而合義者也故三德處六釋張序疇猶孔子序卦乎正蒙王禘第十八禮不王不禘則知諸侯歲闕一祭為不禘明矣至周以祠為春以禴為夏宗廟歲六享則二享四祭為六矣諸候不禘其四享與夏商諸候夏特一祫王制謂礿則不禘禘則不嘗假其名以見時祀之數爾作記者不知文之害意過矣釋立文巧過則義失記中多有之如廟數亦然禘於夏周為春秋嘗於夏商為秋冬作記者交舉以二氣對互而言爾釋禘當在四時祭數之外或舉在四時遂并論耳庶子不祭祖不止言王考而已明其宗也明宗子當祭之不祭禰以父為親之極甚者故又發此文明其宗也庶子不為長子斬不繼祖與禰故也此以服言不以祭言故又明此條庶子不祭殤與無後者注不祭殤者父之庶蓋以殤未足語世數特以已不祭禰故不祭之不祭無後者祖之庶也雖無後以其成人備世數當祔祖以祭之已不祭祖故不得而祭之也祖庶之殤則自祭之也言庶孫則得祭其子之殤者以已為其祖矣無所附之也凡所祭殤者唯適子此據禮天子下祭殤五皆適子適孫之類故知凡殤非適皆不當特祭惟當從祖祔食無後者謂昆弟諸父殤與無後者如祖廟在小宗之家祭之如在大宗釋此言喪祭皆以宗子為重可知其生矣殷而上七廟自祖考而下五并逺廟為祧者二無不遷之太祖廟至周有百世不毁之祖則三昭三穆四為親廟二為文武二世室并始祖而七諸侯無二祧故五大夫無不遷之祖則一昭一穆與祖考而三故以祖考通謂為太祖若祫則請於其君并高祖干祫之干祫之不當祫而時祫之也孔注王制謂周制亦粗及之而不詳爾釋觀干祫之文則雖庶人亦得祭其祖但廟數不同耳祭社稷五祀百神者以百神之功報天之德爾故以天事鬼神事之至也理之盡也釋此仁孝之義祖廟未毁教於公宫則知諸候於有服族人亦引而親之如家人焉釋公宫所以合族也正蒙乾稱第十九凡可狀皆有也凡有皆象也凡象皆氣也氣之性本虛而神則神與性乃氣所固有此鬼神所以體物而不可遺也至誠天性也不息天命也人能至誠則盡性而神可窮矣不息則命行而化可知矣學未至知化非真得也釋性神皆在氣中只一物耳故養成浩然之氣性命皆得有無虛實通為一物者性也不能為一非盡性也飲食男女皆性也是烏可滅然則有無皆性也是豈無對莊老浮屠為説久矣果暢真理乎釋但舉氣則天地人物皆在其中安得言無亦安得又説有若説無除是私欲可無耳有無一內外合庸聖同此人心之所自來也若聖人則不專以聞見為心故能不專以聞見為用無所不感者虛也感即合也咸也以萬物本一故一能合異以其能合異故謂之感若非有異則無合天性乾坤陰陽也二端故有感本一故能合天地生萬物所受雖不同皆無須臾之不感所謂性即天道也釋雖他萬物出不過隂陽只隂陽便會感受其性然也感者性之神性者感之體在天在人其究一也惟屈伸動靜終始之能一也故所以妙萬物而謂之神通萬物而謂之道體萬物而謂之性釋神道性一也至虛之實實而不固至靜之動動而不窮實而不固則一而散動而不窮則往且來釋此便是性命性通極於無氣其一物爾命稟同於性遇乃適然焉人一已百人十已千然有不至猶難語性可以言氣行同報異猶難語命可以言遇釋言性通極於無即是無聲臭之意然亦不能離乎氣也命自我立故以報異言遇釋氏語實際乃知道者所謂誠也天德也其語到實際則以人生為幻妄有為為疣贅以世界為蔭濁遂厭而不有遣而弗存就使得之乃誠而惡明者也儒者則因明致誠因誠致明故天人合一致學而可以成聖得天而未始遺人易所謂不遺不流不過者也彼語雖似是觀其發本要歸與吾儒二本殊歸矣道一而已此是則彼非此非則彼是固不當同日而語其言流遁失守窮大則淫推行則詖致曲則邪求之一卷之中此弊數數有之大率知晝夜隂陽則能知性命能知性命則能知聖人知鬼神彼欲直語太虛不以晝夜隂陽纍其心則是未始見易則雖欲免隂陽晝夜之纍末由也已易且不見又烏能更語真際捨真際而談鬼神妄也所謂實際彼徒能語之而已未始心解也釋釋氏原不識誠又安能論明浮屠明鬼謂有識之死受生循環遂厭苦求免可謂知鬼乎以人生為妄可謂知人乎天人一物輒生取舍可謂知天乎孔孟所謂天彼所謂道或者指遊魂為變為輪回未之思也大學當先知天德知天德則知聖人知鬼神今浮屠極論要歸必謂死生轉流非得道不免謂之悟道可乎自其説熾傳中國儒者未容窺聖學門墻已為引取淪胥其間指為大道其俗達之天下致善惡知愚男女臧獲人人著信使英才間氣生則溺耳目恬習之事長則師世儒宗尚之言遂冥然被驅因謂聖人可不修而至大道可不學而知故未識聖人心已謂不必求其迹未見君子志已謂不必事其文此人倫所以不察庶物所以不明治所以忽德所以亂異言滿耳上無禮以防其偽下無學以稽其弊自古詖淫邪遁之詞翕然並興一出於佛氏之門者千五百年自非獨立不懼精一自信有大過人之才何以正立其間與之較是非計得失釋説佛極盡其病矣人可以不感也將修已必先厚重以自持厚重知學德乃進而不固矣忠信進德惟尚友而急賢欲勝已者親無如改過之不吝釋此解於學有次序矣張子抄釋卷二

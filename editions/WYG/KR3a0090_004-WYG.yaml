body:
  text: 張子抄釋卷四明吕柟撰理窟學大原第七學者且須觀禮盖禮者滋養人德性又使人有常業守得定又可學便可行又可集得義養浩然之氣須是集義集義然後可以得浩然之氣嚴正剛大必須得禮上下達集義者克已也釋此亦内外交養之功書多閲而好忘者只為理未精耳理精則須記了無去處也仲尼一以貫之盖只着一義理都貫却學者但養心識明靜自然可見死生存亡皆知所從来胸中瑩然無疑止此理爾孔子言未知生焉知死盖畧言之死之事只生是也更無别理釋必心常存省後理自然精旣常存省何不知之有旣學而先有以功業為意者於學便相害旣有意必穿鑿創意作起事也德未成而先以功業為事是代大匠斵希不傷手也釋業從德出為學須是要進有以異於人若無以異於人則是鄉人雖貴為公卿若所為無以異於人未免為鄉人富貴之得不得天也至于道德則在已求之而無不得者也釋與俗人同者只是未居廣居􅃧謔直是大無益出於無敬心戲謔不已不惟害事志亦為氣所流不戲謔亦是持氣之一端善戲謔之事雖不為無傷釋只不虐便是和而不流聖人於文章不講而學盖講者有可否之疑須問辨而後明學者有所不知問而知之則可否自决不待講論如孔子之盛德惟官名禮文有所未知故其問老子郯子旣知則遂行而更不須講釋仲尼亦只是明得快耳忠信所以進德者何也閑邪則誠自存誠自存斯為忠信也如何是閑邪非禮而勿視聽言動邪斯閑矣釋只此四勿甚易甚難學者不可謂少年自緩便是四十五十二程從十四嵗時便鋭然欲學聖人今盡及四十未能及顔閔之徒大程可如顔子然恐未如顔子之無我釋至此則横渠之學亦思欲化乎正心之始當以己心為嚴師凡所動作則知所懼如此一二年間守得牢固則自然心正矣釋此便是慎獨工夫古者惟國家則有有司士庶人皆子弟執事又古人於提孩時已教之禮今世學不講男女從幼便驕惰壊了到長益凶很只為未嘗為子弟之事則於其親已有物我不肯屈下病根常在釋教子弟者當誨之於豫憂道則凡為貧者皆道憂貧則凡為道者皆貧釋此即孟子所引陽虎之言人可以不憂道乎氣質猶人言性氣氣有剛柔緩速清濁之氣也質才也氣質是一物若草木之生亦可言氣質惟其能克己則為能變化却習俗之氣惟制得習俗之氣所以養浩然之氣是集義所生者集義猶言積善也義須是常集勿使有息故能生浩然道德之氣某舊多使氣後来殊減更期一年庶幾無之如太和中容萬物任其自然釋此便是能内自訟何氣質不可化婢僕始至者本懷勉勉敬心若到所提掇更謹則加謹慢則棄其本心便習以性成故仕者入治朝則德日進入亂朝則德日退只觀在上者有可學無可學爾釋此為中人以下發然亦警在上者也學得周禮他日有為却做得些實事以某且求必復田制只得一邑用法若許試其所學則周禮田中之制皆可舉行使民相趨如骨肉上之人保之如赤子謀人如已謀衆如家則民自信釋治體便是如此謀為故周禮一書皆周公仁智之心孔子謂柴也愚參也魯亦是不得已須當語之如正甫之隨昞之多疑須當告使知其病則病上偏治莊子謂牧羊者止鞭其後人亦有不須驅䇿處則治其所不足某只是太直無隱已甚人有不善即面舉之釋只如此便是成已成物太直即誠也天下之富貴假外者皆有窮已盖人欲無饜而外物有限惟道義則無爵而貴取之無窮矣釋人之道義與天地同大故貴而尊人之好强者以其所知少也所知多則不自强滿學然後知不足有若無實若虚此顔子之所以進也釋纔自强處便是自退某與人論學二三十年所恨不能到人有得是人人各自體認至如明道行狀後語亦甚鋪陳若人體認儘可以發明道理若不體認亦是一場閒言長語釋凡言能體認不貴多今人為學如登山麓方其迤邐之時莫不濶步大走及到峭峻之處便止須是要剛决果敢以進釋過峭峻處方是登山始可小天下也學之不勤者正猶七年之病不蓄三年之艾今之於學加工數年自是享之無窮人多是耻於問人假使今日問於人明日勝於人有何不可如是則孔子問於老聃萇𢎞郯子賓牟賈有甚不得聚天下衆人之善者是聖人也豈有得其一端而便勝於聖人也釋只肯問便是入聖人心且寧守之其發明却是末事只常體義理不須思更無足疑天下有事其何思何慮自来只以多思為害今且寧守之以攻其惡也處得安且久自然文章出解義明寧者無事也只要行其所無事釋多思者雜思也便是心不存學不進心靜時常少亂時常多其靜時即視明聽聰四體不待覊束而自然恭謹其亂時反是如此者何也盖用心未熟客慮多而常心少也習俗之心未去而實心未全也有時如失者只為心生若熟後自不然心不可勞當存其大者存之熟後小者可畧釋存其大者是寜心要法人言必善聽乃能取益知德斯知言釋善聽雖聞惡言亦有益靜有言得大處有小處如仁者靜大也靜而能慮則小也始學者亦要靜以入德至成德亦只是靜釋小大只爭生熟靜而能慮恐亦不小學不長者無他術惟是與朋友講治多識前言徃行以畜其德非禮勿言非禮勿動即是養心之術也茍以前言為無益自謂不能明辨是非則是不能居仁由義自棄者也决矣人當平物我合内外如是以身鑒物便偏見以天理中鑒則人與己皆見猶持鏡在此但可鑒彼於己莫能見也以鏡居中則盡照只為天理常在身與物均見則自不私己亦是一物人常脱去已身則自明然身與心常相隨不奈何有此身假以接物則舉措須要是今見人意我固必以為當絶於己乃不能絶即是私己是以大人正己而物正須待自己者皆是著見於人物自是而正以誠而明者旣實而行之明也明則民斯信矣己未正而正人便是有意我固必鑒己與物皆見則自然心洪而公平意我固必只為有身便有此至如恐懼憂患忿懥好樂亦只是為其身虚亦欲忘其身賊害而不顧只是要公平不私於己無適無莫義之與比也釋孔子絶四以無意為始無我為終最好玩勿謂小兒無記性所歴事皆能不忘故善養子者當其嬰孩鞠之使得所養令其和氣乃至長而性美教之示以好惡有常至如不欲犬之升堂則時其升堂而扑之若旣扑其升堂又復食之於堂則使孰從雖日撻而求其不升堂不可得也釋溺愛者溺害也教之而不受雖强告之無益譬之以水投石必不納也今夫石田雖水潤沃其乾可立待者以其不納故也出莊子言内無受者不入外無主者不出釋自幼能聽道説便成賢哲初虚故也義理有疑則濯去舊見以来新意中心茍有所開即便劄記不思則還塞之矣更須得朋友之助一日間朋友論看則一日間意思差别須日日如此講論久則自覺進也釋朋友功夫於身最多所以學者貴先擇友在可疑而不疑者不學學則須疑譬之行道将之南山須問道路之出自若安坐則何嘗有疑釋疑只似經厯一般學者只是於義理中求譬如農夫是穮是蓘雖有饑饉必有豐年盖求之則須有得釋道不得患在人不肯為耳道理須從義理生集義又須是博文博文則利用又集義則自是經典已除去了多少掛意精其義直至于入神義則一種是義只是尤精雖曰義然有意必固我便是繋礙動輙不可須是無倚百種病痛除盡下頭有一不犯手勢自然道理如此是快活方真是義也釋到不犯手便是義精且熟也凡所當為一事意不過則推類如此善也一事意得過以為且休則百事廢其病常在謂之病者為其不虚心也又病隨所居而長至死只依舊為子弟則不能安灑掃應對在朋友則不能下朋友在官長為宰相不能下天下之賢甚則至於狥私意義理都喪也只為病根不去隨所居所接而長人須要事事消了病則常勝故要克己釋病處㸔破就除去正猶去疾一般方是好人大抵人能𢎞道舉一字無不透徹如義者謂合宜也以合宜推之仁禮信皆合宜之事惟智則最處先不智則不知則安能為故要知及之仁能守之仁道至大但隨人所取如何學者之仁如此更進則又至聖人之仁皆可言仁有能一日用其力於仁猶可謂之仁又如不穿窬已為義精入神亦是義只在人所𢎞釋惟道無盡愈近愈逺愈求愈失學者大不宜志小氣輕志小則易足易足則無由進氣輕則虚而為盈約而為泰亡而為有以未知為已知未學為已學人之有耻於就問便謂我好勝於人只是病在不知求是為心故學者當無我釋志小氣輕相成聖人無隱者也聖人天也天隱乎及有得處便若日月有明容光必照焉但通得處則到只恐深厚人有所不能見處以顔子觀孔子猶有看不盡處所謂顯諸仁藏諸用者不謂以用藏之但人不能見也虚則事物皆在其中身亦物也治身以道與治物以道同是治物也然治身當在先然後物乃從由此便有親疎逺近先後之次入禮義處釋至貫通後只一理理窟自道第八某學来三十年自来作文字説義理無限其有是者皆只是億則屢中譬之穿窬之盗将竊取室中之物而未知物之所藏處或探知於外人或隔牆聽人之言終不能自到説得皆未足實觀古人之書如探知於外人聞朋友之論如聞隔牆之言皆未得其門而入不見宗廟之美家室之好比嵗方似入至其中知其中是美是善不肯復出天下之議論莫能易此譬如旣鑿一穴已有見又若旣至其中却無燭未能盡室中之有須索移動方有所見言移動者謂逐事要思譬之昏者觀一物必眝目於一不如明者舉目皆見此某不敢自欺亦不敢自謙所言皆實事學者又譬之如有物而不肯捨去者有之以為難入不濟事而去者有之釋曲盡苦學之功可謂思則得之行有餘力真非自謙也祭祀用分至四時正祭也其禮特牲行三獻之禮朔望用一獻之禮取時之新物因薦以是日無食味也元日用一獻之禮喪自齊衰以下不可廢祭釋此禮亦可謂酌中但元日行三獻禮用特牲餘四祭從俗節亦可某向時謾説以為已成今觀之全未也然而得一門庭知聖人可以學而至更自期一年如何今且專以聖人之言為學閒書未用閲閲閒書者盖不知學之不足釋知而好好而且樂矣其勇乎思慮要簡省煩則所存都昏惑中夜因思慮不寐則驚魘不安某近来雖終夕不寐亦能安靜却求不寐此其驗也釋要不寐安靜只有除去一箇利名心又思亦不論繁簡只論邪正若將正思換了邪思便安靜雖不寐亦好故曰終夜不寢以思家中有孔子真嘗欲置於左右對而坐又不可焚香又不可拜而瞻禮皆不可無以為容思之不若卷而藏之尊其道若召伯之甘棠始也勿伐及教益明於南國則至於不敢拜釋此解拜字與詩注異又日拜聖真近於煩黷若臨之在上質之在旁亦自驚愓故曰見堯於牆近作十詩信知不濟事然不敢决道不濟事若孔子於石門是信其不可為然且為之者何也仁術也如周禮救日之弓救月之矢豈不知無益於救但不可坐視其薄蝕而不救意不安也釋日月明知不能救而且救况於民乎宜孔子不已也凡忌日必告廟為設諸位不可獨享故迎出廟設於他次旣出則當告諸位雖尊者之忌亦迎出此雖無古可以意推薦用酒食不焚楮幣其子孫食素釋忌有憂意不可及諸位今衣服以朝燕齋祭四等分之朝則朝服也燕則尋常衣服也齋則深衣祭則細帛通裁寛袖須是教不可便用釋公服三燕服止一故能常敬且慎某旣閒居横渠説此義理自有横渠未嘗如此如此他又非㑹衆教化之所或有賢者經過若此則似繫着在此某雖欲去此自是未有一道理去得如諸葛孔明在南陽便逢先主相召入蜀居了許多時日作得許多功業又如周家發迹於邠遷於岐遷於鎬春積漸向冬漢積漸入秦皆是氣使之然大凡能發見即是氣至若仲尼在洙泗之間修仁義興教化厯後千有餘年用之不已今倡此道不知如何自来元不曾有人説着如揚雄王通又皆不見韓愈又只尚閒言詞今則此道亦有與聞者其已乎其有遇乎釋子厚發此可謂真知的見者矣當其趣信非揚韓諸儒所能道也某始持期喪恐人非笑已亦自若羞恥自後雖大功小功亦服之人亦以為熟已亦熟之天下事大患只是畏人非笑不養車馬食麤衣惡居貧賤皆恐人非笑不知當生則生當死則死今日萬鍾明日棄之今日富貴明日飢餓亦不䘏惟義所在釋此便是真知孟子所謂夭壽不貳者也某平生於公勇於私怯於公道有義真是無所懼大凡事不惟於法有不得更有義之不可尤所當避釋義在處法亦在然亦有法不在處義在大抵義能兼法忌日變服為曾祖祖皆布冠而素帶麻衣為曾祖祖之妣皆素冠布帶麻衣為父布冠布帶麻衣麻履為母素冠布帶麻衣麻履為伯叔父皆素冠帶麻衣為伯叔母麻衣素冠為兄麻衣素帶為弟姪易褐不肉為庶母及嫂一不肉釋酌盡其情矣不但文理窟祭祀第九無後者必祭借如有伯祖至孫而絶則伯祖不得言無後盖有子也至從父然後可以言無後也夫祭者必是正統相承然後祭禮正有所統屬今旣宗法不正則無緣得祭祀正故且須參酌古今順人情而為之今為士者而其廟設三世几筵士當一廟而設三世似是只於禰廟而設祖與曾祖位也有人又有伯祖與伯祖之子者當如何為祭伯祖則自當與祖為列從父則自當與父為列茍不如此使死者有知以人情言之必不安禮於親疎逺近則禮自有煩簡或月祭之或享嘗乃止故拜朔之禮施於三世伯祖之祭止可施於享嘗平日藏其位版於牘中至祭時則取而祫之其位則自如尊卑只欲尊祖豈有逆祀之禮若使伯祖設於他所似不得祫祭皆人情所不安便使庶人亦須祭及三代大夫有大事省于其君干祫及其髙祖釋此言適士一廟而設三世几筵可知庶人大夫矣與程氏禮合奠酒奠安置也若言奠摯奠枕是也謂注之於地非也祭列香茶非古也香必燔柴之意茶用生人意事之膟膋升首今已用之所以達臭也古人因祭祀大事飲食禮樂以㑹賓客親族重專殺必因重事釋古事死即以合生今人之祭但致其事生之禮陳其數而已其於鬼神之道則未也祭祀之禮所總者博其禮甚深今人所知者其數猶不足又安能達聖人致祭之義釋古人事鬼即事人尸惟虞則男女皆有是初祔廟時也至於吉祭則唯見男尸而不見女尸則必女無尸也當初祔時則不可以無尸節服氏言郊祀而送尸車則祀天有尸也天地山川之類非人鬼者恐皆難有尸節服氏言郊祀有亦不害后稷配天而有尸也詩序有言靈星之尸此説似不可取絲衣之詩正是旣祭之明日求神於門其始必有祭其實所以賓禮尸也天子旣以臣為尸不可祭罷便使出門而就臣位故其退尸也皆有漸言絲衣已是不着冕服言弁已是不冠冕也漸有從便之禮至於燕尸必極醉飽所謂不吳不敖胡考之休吳敖猶言娛樂也不娛樂何以成其休考釋尸未必盡然故不能久行七廟之主聚於太祖者此盖有意以其當有祧者且祧者當易檐故盡用出之因而祧之用意婉轉古者言遷主不見所以安置之所若祭器祭服則有焚埋之説木主不知置之何地又公出疆及大夫出聘皆載遷廟之主而行以此觀之則是主常存也然則當其祫時必皆取而合祭也庶人當祭五世以恩須當及也然其祫也止可謂之合食釋禮有隆殺世無逺近凡人家正㕔似所謂廟也猶天子之受正朔之殿人不可常居以為祭祀吉凶冠昏之事於此行之㕔後謂之寢又有適寢是下室所居之室也釋存㕔事以為先人猶在堂上子可教孝思矣八蜡先嗇一也始治稼穡者據易則神農是也司嗇是修此職者二也農三也郵表畷四也猫虎五也坊六也水庸七也百種八也百種百榖之種舊説以昆蟲為八昆蟲是為害者不當祭此嵗終大報也釋此解八蜡却是仁義理窟月令統第十秦為月令必取先王之法以成文字未必實行之道千乗之國敬事而信節用而愛民使民以時此皆法外之意秦茍有愛民為惠之心方能行徒法不能行須實有其心也有其心而無其法則是雖有仁心仁聞不行先王之道不能為政於天下釋月令便是義襲而取古者諸侯之建繼世以立此象賢也雖有不賢者象之而天子使吏治其國彼不得暴其民故舜封象是不得已周禮建國大小必參相得盖皆建大國其勢不能相下皆小國則無紀以小事大莫不有法釋此因論統屬而及井田而不封建猶能養而不能教封建而不井田猶能教而不能養封建井田而不肉刑猶能教養而不能使然此未可遽行之釋此有時義乎理窟喪紀第十一鄭氏之説恐非喪須三年而祔若卒哭而祔則三年都無事禮卒哭猶存朝夕哭若無祭於殯宮則哭於何處古者君薨三年喪畢吉禘然後祫其祫祧主藏於夾室新主遂自殯宮入于廟國語言日祭月享禮中豈有日祭之禮此正謂三年之中不徹几筵故有日祭朝夕之饋猶定省之禮如其親之存也至於祔祭須是三年喪終乃可祔也釋三年於死生之心皆順且安古人於忌日不為薦奠之禮特致哀示變而已古人亦不為影像繪畫不真世逺則棄不免於䙝慢也故不如用主古人猶以主為藏之於櫝設之於位亦為䙝慢故始無設為重鬲以為主道其形制甚陋止用葦篾為之又設於中庭則是敬鬼神而逺之之義重主道也大夫得其重應當有主旣埋重不可一日無主故設苴及其已作主即不用苴釋重主苴一道也正叔嘗為葬説有五相地須使異日决不為道路不置城郭不為溝渠不為貴家所奪不致耕犁所及釋此葬法至要葬法有風水山崗此全無義理不足取南方用青囊猶或得之西方人用一行尤無義理南人試𦵏地將五色帛埋於地下經年而取觀之地美則采色不變地氣惡則色變矣又以器貯水養小魚埋經年以死生卜地美惡取草木之榮枯亦可卜地之美惡釋地氣如此求亦是然即地氣亦有時變韓退之以少孤養於嫂故為嫂服加等大抵族屬之喪不可有加若為嫂養便以有恩而加服則是待兄之恩至薄大抵無母不養於嫂更何處可養若為族屬之親有恩而加等則待已無恩者可不服乎哉昔有士人少養於嫂生事之如母死自處以齊衰或告之非先王之禮聞而遂除之惟持心喪遂不復應舉人以為得禮釋此孔子言子路喪姊之義然恩亦須兼論聖人不制師之服師無定體如何是師見彼之善而已效之便是師也故有得其一言一義如朋友者有相親炙而如兄弟者有成就己身而恩如天地父母者豈可一槩服之故聖人不制其服心喪之可也孔子死弔服如麻亦是服也却不得謂無服也釋程子謂顔閔於孔子雖斬衰三年可也則師豈可無服禮稱母為長子斬三年此理末安父存子為母期母如何却服斬此為父只一子死則世絶莫大之戚故服斬不如此豈可服斬釋母為子斬只是因情戚以立文三年之喪二十五月而畢又兩月為禫共二十七月禮鑽燧改火天道一變其期已矣情不可以已於是再期再期又不可以已於是加之三月是二十七月也釋古二十五月二年加一月今二十七月二年加一時大功已下算閏月期已上以朞斷不算閏月三年之喪禫祥閏月亦筭之釋輕服算閏月師不立服不可立也當以情之厚薄事之大小處之如顏閔於孔子雖斬衰三年可也其成己之功與君父並其次各有淺深稱其情而已下至曲藝莫不有師豈可一槩制服釋此議與程子同有適母在其所生母死禮雖服緦亦當心喪難以求仕釋今為所生母立三年喪於人子獨無恔祭器祭服以其嘗用於鬼神不敢䙝用故有埋焚之禮至於衰絰冠履不見所以毁之文惟杖則言棄諸隱者棄諸隱者不免有時而䙝何不即焚埋之嘗謂喪服非為死者己所以致哀也不須道敬喪服也禮云齊衰不以邊坐大功不以服勤皆言主在哀也非是為敬喪服不邊坐專席而坐禮云有憂者側席而坐有喪者專席而坐有憂則意不安故側席而坐側席者坐不安也有喪者則專在於哀不為容也故專席而坐得席則坐更無所遜於前後是以無容也大功不以服勤不以服勤勞之事皆是不貳事之義也毁喪服者必於除日毁以散諸貧者或諸守墓者皆可也盖古人不惡凶事而今人以為嫌留之家人情不悦不若散之焚埋之又似惡喪服釋喪服亦與杖同藏散皆可練亦謂之功衰盖練其功衰而衣之爾據曾子問三年之喪不弔又雜記三年之衰雖功衰不以弔又服三年之喪旣練矣有期之喪旣葬矣則服其功衰又雜記有父母之喪尚功衰此云尚功衰盖未祥之前尚衣絰練之功衰耳知旣練猶謂之功衰者以下文云則練冠三年之喪禮不當弔而雜記又云雖功衰不以弔兼服之服重者以易輕者舊注不可用此為三年之喪以上而言故作記者以斬齊及大功明之若斬衰旣練齊衰旣卒哭則首帶皆葛又有大功新喪之麻則與齊之首絰麻葛兩施之旣不敢易斬葛之輕以斬葛大於大功之麻又不敢易齊首之重輕者方敢易去則重者固當存故麻葛之􅀴兩施於首若大功旣葬則當服齊首之葛不服大功之葛所謂兼服之服重者則變輕者正謂此爾若齊麻末葛則大功之麻亦止當免則絰之而已如此喪變雖多一用此制前後禮文不相乖戾釋喪漸逺則漸變大扺一三年之喪比終五服皆易徧也練衣必煆煉大功之布以為衣故有言功衰功衰上之衣也以其著衰於上故通謂之衰功必著受服之上稱受者以此得名受盖受始喪斬疏之衰而著之變服其意以喪久變輕不欲摧割之心亟忘於内也此説昔嘗與學者言之今三年始獲二人同矣釋服變衰不變小祥乃練其功衰而衣之則練與功衰非二物也釋只是布稍細張子抄釋卷四

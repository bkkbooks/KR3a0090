body:
  text: 張子抄釋卷三明吕柟撰理窟周禮第一周禮是周公之書然其間必有末世添入者如盟詛之屬必非周公之意葢盟詛起於王法不行人無所取直故要之於神所謂國将亡聽於神詩云侯詛侯呪靡届靡究不與民究極則必至於詛呪釋詛呪在詩中亦有之故周禮云肉刑猶可用於死刑今大辟之罪且如傷舊主者死軍人犯逃走亦死今且以此比刖足彼亦自幸得免死人觀之更不敢犯今之妄人往往輕視其死使之刖足亦必懼矣此亦仁術釋肉刑顯明能懲人為惡六官之職須襟懷洪大方看得葢其規模至大若不得此心欲事事上致曲窮究凑合此心如是之大必不能得也釋氏錙銖天地可謂至大然不嘗為大則為事不得若畀之一錢則必亂矣至如言四句偈等必先曰人所恐懼不可思議及在後則亦是小人所共知者事今所謂死雖奴隸竈間豈不知皆是空彼實是小人所為後有文士學之增飾其間或引入易中之意或更引他書文之故其書亦有文者實無所依取莊子雖其言如此實是畏死亦為事不得釋以周禮對佛莊而言大小公私便明白一市之博百步之地可容萬人四方必有屋市官皆居之所以平物價収滯貨禁爭訟是决不可缺故市易之政非官專欲取利亦所以為民百貨亦有全不售時官則出錢以留之亦有不可買時官皆出而賣之官亦不可失取利民亦不失通其所滯而應其所急故市易之政止一市官之事耳非王政之事也釋漢曹參之齊便以獄市為急市與農亦相等故為政雖市官亦要擇井田之易行但朝廷出一令可以不笞一人而定葢人無敢据土者又須使民悦從其多有田者使不失其為富借如大臣有据土千頃者不過封與五十里之國則已過舊所有其他者量多少與一官使有租税人不失故物治天下之術必自此始今以天下之土棊畫分布人授一方養民之本也後世不制其産止使其力又反以天子之貴專利公自公民自民不相為計其術自城起首立四隅一方正矣又增一表又治一方如是百里之地不日可定何必毁民廬舍墳墓但見表足矣方既正表自無用待軍賦與治溝洫者之田各有處所不可易旁加與井地是也百里之國為方十里者百十里為成成出車一乘是百乗也然開方計之百里之國南北東西各三萬步一夫之田為方者萬步今聚南北一步之慱而會東西三萬步之長則為方步者三萬也是三夫之田也三三如九則百里之地得九萬夫也革車一乗甲士三人步卒七十二人以乗計之凡用七萬五千人今有九萬夫故百里之國亦可言千乗也以地計之足容車乗然取之不如是之盡其取之亦什一之法也其間有山陵林麓不在數釋此亦活法不泥但要乗時耳既使為采地其所得亦十一之法井取一夫之出也然所食必不得盡必有常限其餘必歸諸天子所謂貢也諸侯卿大夫采地必有貢貢者必於時享天子皆廟受之是四海之内各以其職来祭之義其貢亦有常限食采之餘致貢外必更有餘此所謂天子幣餘之賦也以此觀之古者天子既不養兵財無所用必大段富以此知井田行至安樂之道後世乃不肯行以為至難復以天子之威而斂奪人財汲汲終歳亦且不足釋此便是上好仁下好義處雖賦斂中有井田法亦均但要用人卿大夫采地圭田皆以為永業所謂世祿之家然古者世禄之家必不如今日之官户也必有法葢舍役者惟老者疾者貧者賢者能者服公事者舍此雖世禄之家役必不免也明矣釋若但世禄不論老疾貧賢而又免役殃民甚矣井田亦無他術始則因命為田官自後則是擇賢欲求古法亦先須熟觀文字使上下之意通貫大其胸懷以觀之井田卒歸於封建乃定封建必有大功徳者然後可以封建當未封建前天下井邑當如何為治必立田大夫治之今既未可議封建只使守令終身亦可為也所以必要封建者天下之事分得簡則治之精不簡則不精今便封建不肖者復逐之又何害豈又以天下之勢不能正一百里之國使諸侯得以交結以亂天下自非朝廷大不能治安得如此而後世乃謂秦不封建得策此不知聖人之意也釋郡縣選賢而乆任亦類封建地畆限分有定數亦類井田一畝城中之宅授於民者所謂㕓里國中之地也家謂之㕓二十五家為里此無征其有未授閒宅區外有占者征之什一使自賦也釋此如後世罰侵官地五畝國宅城中授於士者五畝以其父子異宫有東宫西宫聨兄弟也亦無征城外郭内授於民者亦五畝於公無征釋此皆定居十畝場圃所任園地也詩十畝之間此也不獨築場納稼亦可毓草木也城在郭外征之二十而一葢中有五畝之宅當受而無征者但五畝外者出税耳釋亦科其過度耳二十五畝宅田士田賈田所任近郊之地也孟子曰餘夫二十五畝此也宅田士之在郊之宅田也士田所受圭田也兼宅田共五十畝賈田賈者所受之田孟子曰卿以下有圭田五十畝此言士者卿士通言之釋亦類家削之賦五十畝官田牛田賞田牧田者所任逺郊之地也官田庶人在官者之田牛田牧公家牛之田賞田賜之田牧田有二牧六畜者一也授於鄉民者一也此四者皆以五十畝為區賞田以厚薄多寡給之百畝鄉民所受井田不易者也此鄉田百畝兼受牧田五十畝故其征二十而三釋同上皆有征百五十畝田百畝萊五十畝遂人職曰夫㕓餘夫亦如之㕓者統百畝之名也又有萊五十畝可薪者也野曰萊鄉曰牧猶民與氓之别其受田之家耕者之外猶有餘夫則受二十五畝之田萊亦半之故曰亦如之其征二十而三二百畝田萊百畝此在二十而三與十二之征之間必更有法三百畝田百畝萊二百畝者其征十二以萊田半見耕之田通田萊三百畝都計之得十二也惟其漆林之征二十而五者其上園地近郊逺郊甸稍縣都之漆林也周制受田自一畝至三百畝計九等餘夫增减猶在數外爾釋以上田皆以肥瘠厚薄分多寡故有至三百畆者則井田亦甚均乎國中以免者多役者少故晩征而早蠲之野以其免者少役者多故早征而晩蠲之貴者賢者能者服公事者老疾者多居國中故免者多近郊疑亦通謂之國中十一使自賦之者葢迫近王城未容井授故其稅十一以為正逺郊二十而三謂逺郊地寛雖上上地猶更給萊田五十畝故其法二十而三餘夫則無萊田六遂然後餘夫有萊田故遂人職云餘夫亦如之國宅無征則逺郊之宅有征可知釋大抵田薄則加萊周制上田以授食多者下田以授食少者此天下之通制也又遂人上田萊五十畝中百畝下二百上田萊五十畝比逺郊井受牧田之民二十而税三者無以異中萊百畝以肥瘠倍上萊下萊二百畝以肥瘠倍中萊此二等葢折衷之均矣然授上萊者税二十而三受下萊者乃多至十二葢田均則食少者優不得不加之税爾周道如砥此之謂也釋此分田有等且計肥瘠達近可謂仁至義盡周禮惟大宰之職難看葢無許大心胷包羅記得此復忘彼其混混天下之事當如捕龍蛇虎豹用心力看方可故議論天下之是非易處天下之事難孔子常語弟子如或知爾則何以哉其他五官便易看止一職也釋太宰兼五官之事皆有脉絡綱維必有仁心周至方能有條不紊理窟詩書第二上天之載無聲無臭但儀刑文王則可以取信萬邦言當學文王者也釋學文王即是學天聖人文章無定體詩書易禮春秋只隨義理如此而言李翺有言觀詩則不知有書觀書則不知有詩亦近之釋聖人之言固事因人而立如化工文王之於天下都無所與焉文王陟降在帝左右只觀天意如何耳觀文王一篇便知文王之美有君人之大徳有事君之小心釋以大徳而有小心便純亦不已與天合萬事只一天理舜舉十六相去四凶堯豈不能堯固知四凶之惡然民未被其虐天下未欲去之堯以安民為難遽去其君則民不安故不去必舜而後因民不堪而去之也釋只是時耳高宗夢傅説先見容貌此事最神夫夢不必須聖人然後夢為有理但天神不間人入得處便入也萬頃之波與汚泥之水皆是受天之光但放来平易心便神也若聖人起一欲得靈夣之心則心固已不神矣神又焉有心聖人心不艱難所以神也高宗只是正心思得聖賢是以有感釋有感必有應如鶴鳴子和尚書難看葢難得胷意如此之大只欲解義則無難也書稱天應如影響其福禍果然否大抵天道不可得而見惟占之於民人所悦則天必悦之所惡則天必惡之只為人心至公也至衆也民雖至愚無知惟於私已然後昏而不明矣至於事不干礙處則是公明大抵衆所向者必是理也理則天道存焉故欲知天者占之於人可也釋人衆處便是上天耳稽衆捨己堯也與人為善舜也聞言則拜禹也用人惟己改過不吝湯也不聞亦式不諫亦入文王也皆虚其心以為天下也釋此最易知此最難行聖學大要在此矣詩序必是同時所作亦有後人添入者則極淺近自可辨也如言不肯飲食教載之只見詩中云飲之食之教之誨之命彼後車謂之載之便云教載絶不成言語也又如高子曰靈星之尸分明是高子言更何疑也釋此與程氏之論合然其大義則有所受矣七月之詩計古人之為天下國家只是豫而已釋憂勤生豫理窟宗法第三管攝天下人心收宗族厚風俗使人不忘本須是明譜系世族與立宗子法宗法不立則人不知統系來處古人亦鮮有不知來處者宗子法廢後世尚譜牒猶有遺風譜牒又廢人家不知來處無百年之家骨肉無統雖至親恩亦薄釋譜系有仁義之道宗子之法不立則朝廷無世臣且如公卿一日崛起於貧賤之中以至公相宗法不立既死遂族散其家不傳宗法若立則人人各知來處朝廷大有所益或問朝廷何所益公卿各保其家忠義豈有不立忠義既立朝廷之本豈有不固今驟得富貴者止能為三四十年之計造作一區及其所有既死則衆子分裂未幾蕩盡則家遂不存如此則家且不能保又安能保國家釋此以宗法存亡論利害甚明白天子建國諸侯建宗亦天理也譬之於木其上下挺立者本也若是旁枝大段茂盛則本自是須低摧又譬之於河其正流者河身若是徑流泛濫則自然後河身轉而隨徑流也宗之相承固理也及旁支昌大則須是却為宗主至如伯邑考又不聞有罪只為武王之聖顧伯邑考不以承太王之緒故須立武王所以然者與其使祖先享卿大夫之祭不若享人君之禮至如人有數子長者至微賤不立其間一子仕宦則更不問長少須是士人承祭祀古所謂支子不祭也者惟使宗子立廟主之而已支子雖不得祭至於齋戒致其誠意則與祭者不異與則以身執事不可與則以物助之但不别立廟為位行事而已後世如欲立宗子當從此義雖不與祭情亦可安若不立宗子徒欲廢祭適足長惰慢之志不若使之祭猶愈於己也釋説重宗所以敬祖之義昭然至一子仕宦承祭又明禮言祭畢然後敢私祭為如父有二子幼子欲祭父來兄家祭之此是私祭祖有諸孫適長孫祭者祭於長孫之家是為公祭釋公祭便是有宗道理窟禮樂第四禮反其所自生樂樂其所自成禮别異不忘本而後能推本為之節文樂統同樂吾分而已禮天生自有分别人須推原其自然故言反其所自生樂則得其所樂即是樂也更何所待是樂其所自成釋同異只是仁義周禮言樂六變而致物各異此恐非周公之制作本意事亦不能如是確然若謂天神降地祗出人鬼可得而禮則庸有此理釋六變亦大畧言耳問角徵羽皆有主出於唇齒喉舌獨宫聲全出於口曰以兼五聲也徵恐只是徴平或避諱為徴仄如是則清濁平仄不同矣齒舌之音異矣釋五聲恐亦闗五藏并達五行到律吕調和處便是隂陽適均故能感天地格鬼神聲音之道與天地同和與政通蠶吐絲而商絃絶正與天地相應方蠶吐絲木之氣極盛之時商金之氣衰如言律中太簇律中林鍾於此盛則彼衰方春木當盛却金氣不衰便是不與天地之氣相應釋聲是氣所為故天人原是一氣一心一聲故有此感彼應鄭衛之音自古以為邪淫之樂何也葢衛之地濱大河沙地土不厚其間人自然氣輕浮其地不苦費耕耨物亦能生故其人偷脱怠弛惰慢頽靡其人情如此其聲音同之故聞其樂使人如此懈慢其地平下其間人自然意氣柔弱怠惰其土足以生古所謂息土之民不才者此也若四夷則皆据高山谿谷故其氣剛勁此四夷常勝中國者此也釋地氣帯得天性禮非止著見於外亦有無體之禮葢禮之原在心禮者聖人之成法也除了禮天下更無道矣欲養民當自井田始治民則教化刑罰俱不出於禮外五常出於凡人之常情五典人日日為但不知耳今之人自少見其父祖從仕或見其鄉閭仕者其心止欲得利禄縱欲於義理更不留意有天生性美則或能孝友亷節者不美者縱惡而已性元不曾識磨礪釋禮行則性自存能答曾子之問能教孺悲之學斯可以言知禮矣進人之速無如禮釋不止禮也道在其中矣故能答不答學者行禮時人不過以為迂彼以為迂在我乃是徑㨗此則從吾所好文則要密察心則要洪放如天地自然從容中禮者盛徳之至也釋洪放而又密察便是道理窟氣質第五變化氣質孟子曰居移氣養移體况居天下之廣居者乎居仁由義自然心和而體正更要約時但拂去舊日所為使動作皆中禮則氣質自然全好禮曰心廣體胖心既𢎞大則自然安舒而樂也若心但能𢎞大不謹敬則不立若但能謹敬而心不𢎞大則入於隘須寛而敬大抵有諸中者必形外故君子心和則氣和心正則氣正其始也固亦須矜持古之為冠者以重其首為履以重其足至於盤盂几杖為銘皆以慎戒之釋洪大敬謹固是調氣亦是養性人之氣質美惡與貴賤夭壽之理皆是所受定分如氣質惡者學即能移今人所以多為氣所使而不得為賢者葢為不知學古之人在鄉閭之中其師長朋友日相教訓則自然賢者多但學至於成性則氣無由勝孟子謂氣壹則動志動猶言移易吾志壹亦能動氣必學至於如天則能成性釋既成性其氣皆變矣氣變後便與天通天本無心及其生成萬物則須歸功於天曰此天地之仁也仁人則須索做始則須勉勉終則復自然人須當存此心及用得熟却恐忘了若事有汩沒則此心旋失失而復求之則才得如舊耳若能常存而不失則就上日進立得此心方是學不錯然後要學此心之約到無去處也立本以此心多識前言往行以畜其徳是亦從此而辨非亦從此而辨矣以此存心則無有不善釋存心熟只是仁熟古人耕且學則能之後人耕且學則為奔迫反動其心何者古人安分至一簞食一豆羮易衣而出只如此其分也後人則多欲故難能然此事均是人情之難故以為貴釋學之難易只在欲之多少孔子文王堯舜皆則是在此立志此中道也更勿疑聖人於此上别有心人志所以不立非才之罪也善取善者雖於不若已采取亦有益心茍不求益則雖與仲尼處何益君子於不善見之猶求益况朋友交相取益乎人於異端但有一事存之於心便不能至理其可取者亦爾可取者不害為忠臣孝子釋此只是虚如是心不能存得牢固操則存捨則亡道義無由得生如地之安靜不動然後可以載物生長以出萬物若今學者之心出入無時記得時存記不得時即休如此則道義從何而生釋只是定耳譬之地甚明白後生可畏有意於古則雖科舉不能害其志不如絶利一源釋論科舉優於程子但人鮮不為其所奪學者有息時一如木偶人牽搐則動舍之則息一日而萬生萬死學者有息時亦與死無異是心死也身雖生身亦本物也天下之物多矣學者本以道為生道息則死也終是僞物當以木偶人為譬以自戒知息為大不善因設惡譬如此只欲不息釋息便是人欲故曰人心惟危君子不必避他人之言以為太柔太弱至於曕視亦有節視有上下視高則氣高視下則心柔故視國君者不離紳帶之中學者先須去客氣其為人剛行則終不肯進堂堂乎張也難與並為仁矣葢目者人之所常用且心常記之視之上下且試之已之敬傲必見於視所以欲下其視者欲柔其心也柔其心則聽言敬且信人之有朋不為燕安所以輔佐其仁今之朋友擇其善柔以相與拍肩執袂以為契合一言不合怒氣相加朋友之際欲其相下不倦故於朋友之間主其敬者日相親與得效最速仲尼嘗曰吾見其居於位也與先生並行也非求益者也欲速成者也則學者先須温柔温柔則可以進於學詩曰温温恭人惟徳之基葢其所益之多多聞見適足以長小人之氣君子荘敬日强始則須拳拳服膺出於牽勉至於中禮却從容如此方是為已之學鄉黨說孔子之形色之謹亦是敬此皆變化氣質之道也釋人知謙虚方有進求養之道心只求是而已葢心𢎞則是不𢎞則不是心大則百物皆通心小則百物皆病悟後心常𢎞觸理皆在吾術内覩一物又敲㸃着此心臨一事又記念着此心常不為物所牽引去視燈燭亦足以警道大率因一事長一智只為持得術博凡物常不能出博大之中釋心存則自能開悟能開悟則自能博大求心之始如有所得乆思則茫然復失何也夫求心不得其要鑽研太甚則惑心之要只是欲平曠熟後無心如天簡易不已今有心以求其虚則是已起一心無由得虚切不得令心煩求之太切則反昏惑孟子所謂助長也孟子亦只言存養而已此非可以聰明思慮力所能致也然而得博學於文以求義理則亦動其心乎夫思慮不違是心而已尺蠖之屈以求伸也龍蛇之蟄以全身也精義入神以致用也利用安身以崇徳也此交相養之道夫屈者所以求伸也勤學所以修身也博文所以崇徳也惟博文則可以力致人平居又不可以全無思慮須是考前言往行觀昔人制節如此以行其事而已故動焉而無不中理釋只是定後便能有進立本既正然後修持修持之道既須虚心又須得禮内外發明此合内外之道也當是畏聖人之言考前言往行以畜其徳度義擇善而行之致文於事業而能盡義者只是要學曉夕參詳比較所以盡義惟博學然後有可得以參校琢磨學博則轉密察鑽之彌堅於實處轉篤實轉誠轉信故只是要博學學愈博則義愈精微舜好問好察邇言皆所以盡精微也舜與仲尼心則同至於密察處料得未如孔子大抵人君則有輔弼疑丞中守至正而已若學者則事必欲皆自能又将道輔於人舜為人君猶起於側微釋精微只在廣大中故好問好察巨細一道學者所志至大猶恐所得淺况可便志其小茍志其小志在行一節而已若欲行信亦未必能信自古有多少要如仲尼者然未有如仲尼者顔淵學仲尼不幸短命孟子志仲尼亦不如仲尼至如樂正子為信人為善人其學亦全得道之大體方能如此又如漆雕開言吾斯之未能信亦未説信甚事只是謂於道未信也釋仲兄只是好古敏求過人慎喜怒此只矯其末而不知治其本宜矯輕警惰若天祺公之弟御史氣重也亦有矯情過實處釋矯在偏處用則可不然則過實人多言安於貧賤其實只是計窮力屈才短不能營畫耳稍動得恐未肯安之須是誠知義理之樂於利欲也乃能釋到樂處則真知矣除是孔顔天資美不足為功惟矯惡為善矯惰為勤方是為功人必不能便無是心須使思慮但使常游心於義理之間立本處以易簡為是接物處以時中為是易簡而天下之理得時中則要博學素備釋易簡只是無私曲心博學便知太過不及非謂泛觀也理窟義理第六學未至而好語變者必知終有患葢變不可輕議若驟然語變則知操術已不正釋此未能立而言權鮮不仆矣之意人到向道後俄頃不捨豈暇安寢然君子向晦入燕處君子隨物而止故入燕處然其仁義功業之心未嘗忘但以其物之皆息吾兀然而坐無以為接無以為功業須亦入息釋只是隨時動静如天之春冬然不道冬全無生意亦自藏在裏面此學以為絶耶何因復有此議論以為興耶然而學者不博孟子曰無有乎爾則亦無有乎爾孔子曰天之未喪斯文也匡人其如予何今欲功及天下故必多栽培學則道可傳矣釋此子厚以孔孟自處之實人不知學其任智自以為人莫及以理觀之其用智乃癡耳碁酒書畫其術同均無益也坐寢息其術同差近有益也惟與朋友燕會議論良益也然大義大節須要知若細微亦不必知也釋程子又曰兩相觀為善功夫多凡人為上則易為下則難然不能為下亦未能使下不盡其情僞也大抵使人常在其前已嘗為之則能使人凡事蔽葢不見底只是不求益有人不肯言其道義所得所至不得見底又非於吾言無所不説釋此只是不肯真學故表裏不一人雖有功不及於學心亦不宜忘心茍不忘則雖接人事即是實行莫非道也心若忘之則終身由之只是俗事釋無事無心今人自强自是樂己之同惡己之異便是有固必意我無由得虚學者理會到此虚心處則教者不須言求之書合者即是聖言不合者則後儒添入也釋虚心見理便真無窒故也尊其所聞則高明行其所知則光大凡未理會至實處如空中立終不曾踏着實地性剛者易立和者易達人只有立與達已欲立而立人已欲達而達人然則剛與和猶是一偏惟大達則必立大立則必達釋大立大達只是義與仁聞見之善者謂之學則可謂之道則不可須是自求已能尋見義理則自有㫖趣自得之則居之安矣釋因聞見有得亦不可謂非道道徳性命是長在不死之物也已身死此則常在釋此道之常在即已身亦常在釋氏之言學以心役物使物不役心周孔之道豈是物能役心虚室生白釋虚生白只是誠則明矣此道自孟子後千有餘歳今日復有知者若此道天不欲明則不使今日人有知者既使人知之似有復明之理志於道者能自出義理則是成器釋張子自任類孟子人一能之已百之人十能之已千之曰能者是今日不能而能之若以聖人之能而為不能則狂者矣終身而莫能得也學貴心悟守舊無功釋心悟便是心常存知徳斯知言已嘗自知其徳然後能識言也人雖言之已未嘗知其徳豈識其言須是已知是徳然後能識是言猶曰知孝之德則知孝之言也釋知徳後已行過故識言為學大益在自能變化氣質不爾卒無所發明不得見聖人之奥故學者先須變化氣質變化氣質與虚心相表裏釋豈止表裏學不能推究事理只是心麤至如顔子未至於聖人處猶是心麤釋未化故也學者言不能識得盡多相違戾是為無天徳今顰眉以思已失其心也蓋心本至神如此則已将不神害其至神矣釋至神處思亦已且滋養其明明則求經義将自見矣又不可徒養須觀他前言往行便畜得已徳若要成徳須是速行之釋明行一理當自立說以明性不可以遺言附會解之若孟子言不成章不達及四體不言而喻此非孔子曾言而孟子言之此是心解也釋纔能立説便是學過不是襲取讀書少則無由考校得義精葢書以維持此心一時放下則一時徳性有懈讀書則此心常在不讀書則終看義理不見書須成誦精思多在夜中或靜坐得之不記則思不起但通貫得大原後書亦易記所以觀書者釋己之疑明己之未達每見每知所益則學進矣於不疑處有疑方是進矣釋須有疑後方明孔子適周誠有訪樂於萇𢎞問禮於老􅅨老􅅨未必是今老子觀老子薄禮恐非其人然不害為兩老子猶左丘明别有作傳者也釋言亦有為而發不可道老子是二人家語國語雖於古事有所證明然皆亂世之事不可以證先王之法觀書且勿觀史學理會急處亦無暇觀也然觀史又勝於游山水林石之趣始似可愛終無益不如游心經籍義理之間釋讀經後看史易心解則求義自明不必字字相校譬之目明者萬物紛錯於前不足為害若目昏者雖枯木朽株皆足為梗釋覺思後始自得觀書且不宜急迫了意思則都不見須是大體上求之言則指也指則所視者逺矣若只泥文而不求大體則失之是小兒視指之類也常引小兒以手指物示之而不能求物以視焉只視於手及無物則加怒耳釋言為大人之學不當如小兒識見博大之心未明觀書見一言大一言小不從博大中來皆未識盡既聞中道不易處且休會歸諸經義已未能盡天下之理如何盡天下之言聞一句語則起一重心所以處得心煩此是心小則百物皆病也今既聞師言此理是不易雖掩卷守吾心可矣凡經義不過取證明而已故雖有不識字者何害為善易曰一致而百慮既得一致之理雖不百慮亦何妨既得此心復因狂亂而失之譬諸亡羊者挾策讀書與飲酒博塞其亡羊則一也可不監釋明博大之心亦只是會本窮源人之迷經者蓋已所守未明故常為語言可以移動已守既定雖孔孟之言有紛錯亦不須思而改之復鋤去其繁使詞簡而意備釋只是極高明便見經籍亦須記得雖有舜禹之智吟而不言不如聾盲之指麾故記得便説得説得便行得故始學亦不可無誦數釋自是切實次序若記得止為説得不為行得便不是某觀中庸義二十年每觀每有義已長得一格六經循環年欲一觀觀書以静為心但只是物不入心然人豈能長靜須以制其亂釋觀書亦制心亂之一方大抵古人言行多是治心病的方子發源端本處既不誤則義可以自求嘗謂文字若史書歴過見得無可取則可放下如此則一日之力可以了六七卷書又學史不為為人對人耻有所不知意只在相勝醫書雖聖人存此亦不須大段學不㑹亦不甚害事㑹得不過惠及骨肉間延得頃刻之生决無長生之理若窮理盡性則自㑹得如文集文選之類看得數篇無所取便可放下如道藏釋典不看亦無害既如此則無可得看唯是有義理也故六經則須着循環能使晝夜不息理會得六七年則自無可得看若義理則儘無窮待自家長得一格則又見得别語道斷自仲尼不知仲尼以前更有古可稽雖文字不能𫝊然義理不滅則須有此言語不到得絶釋道自開闢便有人能言只至仲尼宏精耳由學者至顔子一節由顔子至仲尼一節是至難進也二節猶二闗然而得仲尼地位亦少詩禮不得孔子謂學詩學禮以言以立不止謂學者聖人既到後直知須要此不可闕不學詩直是無可道除是穿鑿任已知詩禮易春秋書六經直是少一不得釋六經如飲食衣服人當於中盡所以耕耘織絍之方張子抄釋卷三

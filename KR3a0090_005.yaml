body:
  text: 張子抄釋卷五明呂柟撰語録第一上智下愚不移充其德性則為上智安於見聞則為下愚不移者安於所執而不移也釋此不移雖是天定亦人自不肯移耳子貢謂夫子所言性與天道不可得而聞既云夫子之言則是居常語之矣聖門學者以仁為己任不以茍知為得必以了悟為聞因有是說明賢思之釋此係真知實見非耳聞也舜好問仲尼每事問德同矣學亦同否釋惟學同則德同除好問再無學問矣仲尼自志學至老德進何晚竊意仲尼自志學固已明道其立固已成性就上益進蓋由天之不已為天已定而所以為天不窮如有成性則止則舜何必孜孜仲尼何必不知老之將至且歎其衰不復夢見周公由此觀之學之進德可知矣釋只肯學不厭便是生知聖之時當其可之謂時取時中也可以行可以止此出處之時也至於言語動作皆有時也釋只時便與天地合德故云天有四時舜三十而徴庸是有聞於一朝也成聖之速自古無如舜也舜為仁之大端也釋舜生而從辛苦中過故蚤熟學者至于與孟子之心同然後能盡其義而不疑釋孟子能盡心知性以故明賢人為天下知聖人當受命雖不受知不受命然為聖為賢乃吾性分當勉耳釋人止可盡其在我賢者在堯舜之世亦有不得遇者亦有甚不幸者是亦有命也即智之於賢者不獲知也釋賢者遇不遇又關世運窮理亦當有漸見物多窮理多如此可盡物之性釋窮久自明天地之道可以一言而盡也凡言道皆能盡天地但不得其理至如可欲皆可以至聖神但不嘗得聖神滋味天地之道以術知者却是妄釋知己知天大凡禮不可大段駭俗不知者以為怪且難之甚者至于怒之疾之故禮亦當有漸於不可知者少行之已為多矣但不出户庭親行之可也母强其人為之已德性充實人自化矣正己而物正也釋此便是易簡之道人之出處則出而足以利天下亦可出為免死之仕亦可出今人過憂盜賊禍難妄動避之多自致傷者又禍未必然而自禍者此惡溺而投河之類也釋禍豈可預避只可省已訂頑之作只為學者而言是所以訂頑天地更分甚父母用欲學者心於天道若語道則不須如是言釋觀張子志只是喻人於道人言不信怪須是於實事上不信又曉其理方是了當茍不然方才劫之以不測又畢竟信也釋只要人實見得質疑非遁辭之比也遁辭者無情只是他自信元無所執守見人說有已即說無反入於太髙見人說無已則說有反入於至下或太髙或太下只在外面走元不曾入中道此釋老之類故遁辭者本無情自信如此而已若質疑者則有情實遂其罪也釋質疑謂身執言語知之為用甚大若知則以下來都了只為知包著心性識知者一知心性之關轄然也今學者正惟知心性識不知如何安可言知知及仁守只是心到處便謂之知守者守其所知知有所極而人知則有限故所謂知及只言心到處釋真知便能力行也某比來所得義理儘彌久而不能變必是屢中於其間只是昔日所難今日所易昔日見得心煩今日見得心約到近上更約必是精處尤更約也釋到約處便近易簡孔子三人行必得我師焉此聖人取善顔子亦在此術中然猶著心以取益比聖人差别聖人則所見是益釋只如太虛何物不容作者七人伏羲也神農也黃帝也堯也舜也禹也湯也所謂作者上世未有作而作之者也伏羲始服牛乘馬者也神農始教民稼穡者也黃帝始正名百物者也堯始推位舜始封禪者也堯以德禹以功故别數之湯始革命者也若謂武王為作則作已是述湯之事也若以伊尹為作則當數周公恐不肯以人臣謂之作若孔子自數為作則自古以來實未有如孔子者然孔子已是言述而不作也釋此作者孔子蓋言已所述者也學者當須立人之性仁者人也當辨其人之所謂人學者學所以為人釋此不可逺人為道之意為學大益在自求變化氣質不爾皆為人之弊卒無所發明不得見聖人之奧釋變化氣質便是攻其惡無攻人之惡義理有礙則濯去舊見以來新意釋褊淺處是舊見多求新意以開昏蒙吾學不振非强有力者不能自奮足下信篤持謹何患不至正惟求一作來自粹美得之最近釋求粹美便是變化氣質萬物皆有理若不知窮理如夢過一生釋氏便不窮理皆以為見病所致莊生儘能明理及至窮極亦以為夢故稱孔子與顔淵語曰吾與爾皆夢也蓋不如易之窮理也釋理窮到如夢而醒有志於學者都更不論氣之美惡如看志如何匹夫不可奪志也惟患學者不能堅勇釋志定則氣不亂志一則氣不衰學須以三年為期孔子曰朞月可也三年有成大凡事如此亦是一時節期月是一嵗之事舉偏也至三年事大綱慣熟學者又須以自朝及晝至夜為三節積纍功夫更有勤學則於時又以為限釋只是要自强不息人與動植之類已是大分不齊於其類中又極有不齊某嘗謂天下之物無兩箇有相似者雖一件物亦有隂陽左右譬之人一身中兩手為相似然而有左右一手之中五指而復有長短直至於毛髮之類亦無有一相似至如同父母之兄弟不惟其心之不相似以至聲音形狀亦莫有同者以此見直無一同者釋雖隂陽生人只添入五行便不能齊故星算皆幸而中人一已百人十已千如此不至者猶難罪性語氣可也同行報異猶難語命語遇可也氣與遇性與命切近矣猶未易言也釋至性命處即至誠無息矣凡觀書不可以相類泥其義不爾則字字相梗當觀其文勢上下之意如充實之謂美與詩之言美輕重不同近思作程語用釋字本有淺深鄉原狥欲而畏人其心乃穿窬之心也茍狥欲而不畏人方明盜耳遁辭乃鄉原之辭也無執守故其辭妄釋鄉願不顧自已所至只是要彌縫外邊當自立說以明性不可以遺言附會解之若孟子言不成章不達及所性四體不言而喻此非孔子曾言而孟子言之此是心解也釋言當自立說亦恐未安但心解後其言自别世學不明千五百年大丞相言之於書吾輩治之於己聖人之言庶可期乎顧所學謀之太迫則心勞而不虛質之太煩則泥文而滋弊此僕所以未置懷於學者也釋此正欲如杜預所言優柔厭飫之意詖淫邪遁之辭古語孰近詖辭茍難近於並耕為我淫辭放侈近於兼愛齊物邪辭離正近於隘與不恭遁辭無守近於揣摩說難四者可以盡天下之狂言釋四言似是而非故害道尤甚孟子之言性情皆一也亦觀其文勢如何情未必為惡哀樂喜怒發而皆中節謂之和不中節則為惡釋孟子數言性善釋氏之說所以陷者以其待天下萬物之性為一猶告子生之謂性今之言性者汗漫無所執守所以臨事不精學者先須立本釋釋氏舍人事而言故卒歸于無用隂陽者天之氣也亦可謂道剛柔緩速人之氣也亦可謂性生成覆幬天之道也亦可謂理仁義禮智人之道也亦可謂性損益盈虛天之理也亦可謂道壽夭貧賤人之理也亦可謂命天授於人則為命亦可謂性人受於天則為性亦可謂命形得之備不必盡然氣得之偏不必盡然道得之同理得之異亦可互見此非學造至約不能區别故互相發明貴不碌碌也釋其究只一理其生只一心大率玩心未發可求之平易勿迂也若始求太深恐自兹愈逺釋平易只是在人事上求子夏未盡反身處可更求之題不動心章告子所止到己言所不及處孟子所止到己所難名處然則告子所見所言與孟子所守所見可知矣同上不知命則大無信故命立而後心誠題盡心章誠則實也太虛者天之實也萬物取足於太虛人亦出於太虛太虛者心之實也釋虛者無欲也故能實虛者仁之原忠恕者與仁俱生禮義者仁之用敦厚虛靜仁之本敬和接物仁之用太虛者自然之道行之要在思故曰思誠虛心然後能盡心虛則生仁仁在理以成之釋虛生仁可詳玩虛心則無外以為纍人生固有天道人事當行不行則無誠不誠則無物故須行實事惟聖人踐形為實之至得人之形可離非道也釋踐形便是實事與天同原謂之虛須得事實故謂之實此叩其兩端而竭焉更無去處釋此便是形而上下天地之道無非以至虛為實人須於虛中求出實聖人虛之至故擇善自精心之不能虛者有物榛礙金鐵有時而腐山嶽有時而摧凡有形之物即易壞惟太虛無動搖故為至實詩云德輶如毛毛猶有倫上天之載無聲無臭至矣釋以至虛為至實要思得之觀太虛生物無測萬古不壞靜者善之本虛者靜之本猶對動虛則至一氣之蒼蒼目之所止也日月星辰象之著也當以心求天之虛大人不失其赤子之心赤子之心今可知也以其虛也釋只無欲便虛天地以虛為德至善者虛也虛者天地之祖天地從虛中來釋天地是虛若從虛中來天地又一物也中宮土寄王之說於理非也大率五行之氣分王四時土固多於四者然其運行之氣則均施錯見金木水火皆分主四時獨不見土之所主是以有寄王之說然於中乃在季夏之末者且以易言之八卦之作坤在西南西南致養之地在離兊之間離兊即金火也是以在季夏之末釋言五行均施錯見於四時甚當故厯每季旺其曰季夏之末者又以四時中言也五緯五行之精氣也所以知者以天之星辰獨此五星動以色言之又有驗以心取之亦有此理釋五行在地與五緯在天同運要識五臟五性五情五事亦是此禮文參校是非去取不待已自了當蓋禮者理也須是學窮理禮則所以行其義知理則能制禮然則禮出於理之後今在上者未能窮則在後者烏能盡今禮文殘缺須是先求得禮之意然後觀禮合此理者即是聖人之制不合者即是諸儒添入可以去取今學者所以宜先觀禮者類聚一處他日得理以意參校釋此亦約禮之意能知約後則禮無不可定也知之於賢者知人之謂知賢者當能知人有於此而不受知於賢者知不施於賢者也晏嬰之賢亦不知仲尼於仲尼猶吹毛直欲陷害孔子如歸女樂之事釋此猶是晏嬰為齊之私心若孔子并其善交亦取之矣時中之義甚大䝉亨以亨行時中也䝉何以有亨以九二之亨行䝉者之時中此所以䝉得亨也䝉無遽亨之理以九二循循行時中之亨也䝉卦之義正者全在九二彖之所論皆二之義教者但只看䝉者時之所及則導之是以亨行時中也此時也正所謂如時雨化之若既引之中道而不使之通教者之過也當時而引之使不失其正此教者之功也䝉以養正聖功也是養其蒙以正聖人之功也釋於䝉時養正便是機法失此難孟子言水之有本無本者以况學者有所止也大學之道在止於至善此是有本也思天下之善無不自此始然後定止於此發源立本樂正子有本者也日月而至焉是亦有本者也聲聞過情是無本而有聲聞者也向後僞迹俱辨則都無也釋只其人可欲便是有本以後聖神皆可至也某比年所思慮事漸不可易動嵗年間只得變得些文字亦未可謂辭有巧拙其實是有過若是達者其言自然别寬而約沒病痛者不是到了是不知知一物則說得仔細必實聖人之道以言者尚其辭辭不容易只為到其間知得詳然後言得不錯譬之到長安極有知長安仔細者然某近來思慮義理大率億度屢中可用既是億度屢中可用則以大受某唱此絶學亦輒欲成一次第但患學者寡故少貪於學者今之學者大率為應舉壞之入仕則事官業無暇及此由此觀之則呂范過人逺矣呂與叔資美但向學差緩惜乎求思也褊求思雖似褊隘然褊不害於明褊是氣也明者所學也明何以謂之學明者言所見也大凡寬褊者是所禀之氣也氣者自萬物散殊時各有所得之氣習者自胎胞中以至於嬰孩時皆是習也及其長而既有所立自所學者方謂之學性則分明在外故曰氣其一物爾氣者在性習之間性猶有氣之惡者為病氣又有習以害之此所以要鞭辟至於齊强學以勝其氣習其間則更有緩急精粗則是人之性雖同氣則有異天下無兩物一般是以不同孔子曰性相近也習相逺也性則寬褊昏明名不得是性莫不同也至于習之異斯逺矣雖則氣之禀褊者未至於成性時則暫或有暴發然而所學則却是正當其如此其一作不則漸寬容茍志于學則可以勝其氣與習此所以褊不害於明也須知自誠明與明誠者有異自誠明者先盡性以至於窮理也謂先自其性理㑹來以至行理自明誠者先窮理以至於盡性也謂先從學問理以推達於天性也某自是以仲尼為學而知者某今亦竊希於明誠所以勉勉安於不退孔子稱顔淵曰惜乎吾見其進也未見其止也茍惟未止則可以竊冀一誠就自明誠者須是要窮理窮即是學也所觀所求皆學也長而學固所謂之學其幼時豈可不謂之學直自在胞胎保母之教己雖不知謂之學然人作之而已變以化於其教則豈不謂之學學與教皆學也惟其受教即是學也只是長而學庸有不待教習便謂之學只習有善惡只一作但某所以使學者先學禮者只為學禮則便除去了世俗一副當習熟纒繞譬之延蔓之物解纒繞即上去上去即是理明矣又何求茍能除去了一副當世習便自然脫灑也又學禮則可以守得定所謂長而學謂之學者謂有所立自能知向學如孔子十五而志於學是學也如謂有所成立則十五以前庸有不志於學時一本云如孔子五十而學是學也如謂有所成立則五十以前庸有不志於學若夫今學者所欲富貴聲譽博聞繼承是志也某只為少小時不學至今日勉强有太甚則反害欲速不達亦須待嵗月至始得釋此子厚求進於純亦不己之地蓋自受氣受習之時而欲變化之也湯征未至而怨者非史氏之溢辭是實怨今郡縣素困弊政亦望一良吏莫非至誠平居亦不至甚有事當其時則顧望其上之來是其心若解倒懸也天下之望湯是實如父母願耕願出莫非實如此至朋來而樂方謂道義進是實可樂也釋民思自遂其欲豈不怨湯未至武成取二三䇿言有取則是有不取也孟子真知武王故不信漂杵之說知德斯知言故言使不動釋血流漂杵書謂紂衆倒戈自殺從心莫如夢夢見周公志也不夢欲不踰矩也釋此解却恐太深顔子知當至而至焉故見其進也不極善則不處焉故未見其止也知必至者知志於道致廣大極髙明此則儘逺大所處則直是精約顔子方止求而未得故未見其止也極善者須以中道方謂極善故大中謂之皇極蓋過則便非善不及亦非善此極善是顔子所求也所以瞻之在前忽焉在後夫子髙逺處又要求精約處又要至顔子之分必是入神處又未能精義處又未至然顔子雅意則直要做聖人學者須是學顔子發意便要至聖人猶不得况便自謂不能雅意則然非宜見於議論釋髙逺精約非兩事性美而不好學者無之好學而性不美者有之蓋向善急便是性美也性不美則學得亦轉了故孔子要好仁而惡不仁者只好仁則忽小者只惡不仁則免過而已故好惡兩端並進好仁則難遽見功惡不仁則有近效日見功若顔子是好仁而惡不仁者也云未見者或此道在顔子後言見善如不及此好仁者也見不善如探湯此惡不仁者也無欲而好仁無畏而惡不仁同此義釋好惡不可偏廢好仁而不惡不仁好之必不篤惡不仁而不好仁惡之必不切盡得天下之物方要窮理窮得理又須要實到孟子曰萬物皆備於我矣反身而誠樂莫大焉實到其間方可言知未知者方且言識之而已既知之又行之惟難萬物皆備於我矣又却要强恕而行求仁為近禮自外作故又與孟子義內之說如相違孟子方辨道故言自得深造作記者必不知內且據掠淺知釋禮自外作對樂而言各有所指到樂處便是自得更奚言內外知之於賢者彼此均賢也我不知彼是我所患彼不知我是命也均聖人也舜禹即不受命受祿舜禹亦無患焉釋言不為人知而無祿命之受舜禹亦無患顔子樂正子皆到可欲之地但一人向學緊一人向學慢釋緊則幾於化慢則美亦未能言盡物者據其大總也今言盡物者未說到窮理但恐以聞見為心則不足以盡心人本無心因物為心若只以聞見為心但恐小却心今盈天地之間者皆物也如只據己之聞見所接幾何安能盡天下之物所以欲其盡心也窮理則細微甚有分别至如作樂其始亦但知其大總更去其間比較方盡其細理若便謂推類以窮理為盡物則是亦但據聞見上推類却見聞見安能盡物今所言盡物蓋欲其盡心耳釋盡心且知天况物乎坎惟心亨故行有尚外雖積險茍處之心亨不疑則雖難必濟而往有功也今水臨萬仞之山要下即下無復凝滯險在前惟知有義理而已則復何回避所以心通釋心亨惟有孚耳故曰水有信人所以不能行己者於其所難者則惰其異俗者雖易而羞縮惟心𢎞則不顧人之非笑所趨義理耳視天下莫能移其道然為之人亦未必怪正以在己者義理不勝惰與羞縮之病消則有長不消則病常在意思齷齪無由作事在古氣節之士冒死以有為於義未必中然非有志槩者莫能况吾於義理已明何為不為釋只是要人知止見得箇是便坦然無疑也姤初六羸豕孚蹢躅豕方羸時力未能動然至誠在於蹢躅得伸則伸矣如李德裕處置閹宦徒知其帖忠威伏而忽於志不妄逞照察少年不至則失其幾也釋裕縱能照察亦是第二著人教小童亦可取益絆已不出入一益也授人數數已亦了此文義二益也對之必正衣冠尊贍視三益也常以因已而壞人之才為憂則不敢惰四益也釋張子從淺處說耳若得成已成物更進益學記曰進而不顧其安使人不由其誠教人不盡其材人未安之又進未喻之又告之徒使人生此節目不盡材不顧安不由誠皆是施之妄也教人至難必盡人之材乃不謬人觀可及處然後告之聖人之明直若庖丁之解牛皆知其隙刃投餘地無全牛矣人之才足以有為但以其不由於誠則不盡其才若曰勉率而為之則豈有由誠哉釋此孔子可以語上下之意古之小兒便能敬事長者與之提携則兩手奉長者之手問之掩口而對蓋稍不敬事便不忠信故教小兒且先安詳恭敬釋賢聖愚不肖根於此孟子曰人不足與適也政不足與間也唯大人為能格君心之非非惟君心至於朋游學者之際彼雖議論異同未欲深較惟整理其心使歸之正豈小補哉釋才欲格人心己心已至誠明張子抄釋卷五

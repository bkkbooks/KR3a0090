body:
  text: 張子抄釋卷一明吕柟撰西銘第一乾稱父坤稱母豫兹藐焉乃混然中處故天地之塞吾其體天地之帥吾其性民吾同胞物吾與也大君者吾父母宗子其大臣宗子之家相也尊高年所以長其長慈孤弱所以幼其幼聖其合德賢其秀也凡天下疲癃殘疾惸獨鰥寡皆吾兄弟之顛連而無告者也于時保之子之翼也樂且不憂純乎孝者也違曰悖德害仁曰賊濟惡者不才其踐形惟肖者也知化則善述其事窮神則善繼其志不愧屋漏為無忝存心養性為匪懈惡㫖酒崇伯子之顧養育英才潁封人之錫類不施勞而底豫舜其功也無所逃而待烹申生其恭也體其受而歸全者參乎勇於從而順令者伯竒也富貴福澤將以厚吾之生也貧賤憂戚庸玉汝於成也存吾順事沒吾寧也釋此舜欲並生之心孟子立命之意也東銘第二戲言出於思也戲動作於謀也發於聲見乎四肢謂非己心不明也欲人無己疑不能也過言非心也過動非誠也失於聲繆迷其四體謂己當然自誣也欲他人已從誣人也或者以出於心者歸咎為已戲失於思者自誣為已誠不知戒其出汝者引一作歸咎其不出汝者長傲且遂非不智孰甚焉釋君子之所以動天地感人鬼者惟誠於言行耳正䝉太和第三太和所謂道中涵浮沉升降動靜相感之性是生絪緼相蕩勝負屈伸之始其來也幾微易簡其究也廣大堅固起知於易者乾乎效法於簡者坤乎散殊而可象為氣清通而不可象為神不如野馬絪緼不足謂之太和語道者知此謂之知道學易者見此謂之見易不如是雖周公才美其智不足稱也已釋此理氣合一神化無二之㫖也太虛無形氣之本體其聚其散變化之客形爾至靜無感性之淵源有識有知物交之客感爾客感客形與無感無形惟盡性者一之釋性兼虛形靜感天地之氣雖聚散攻取百塗然其為理也順而不妄氣之為物散入無形適得吾體聚為有象不失吾常太虛不能無氣氣不能不聚而為萬物萬物不能不散而為太虛循是出入是皆不得已而然也然則聖人盡道其間兼體而不纍者存神其至矣彼語寂滅者往而不返徇生執有者物而不化二者雖有間矣以言乎失道則均焉釋此可以觀明善而誠身矣知虛空即氣則有無隱顯神化性命通一無二顧聚散出入形不形能推本所從來則深於易者也若謂虛能生氣則虛無窮氣有限體用殊絶入老氏有生於無自然之論不識所謂有無混一之常若謂萬象為太虛中所見之物則物與虛不相資形自形性自性形性天人不相待而有陷於浮屠以山河大地為見病之說此道不明正由懵者略知體虛空為性不知本天道為用反以人見之小因緣天地明有不盡則誣世界乾坤為幻化幽明不能舉其要遂躐等妄意而然不悟一隂一陽範圍天地通乎晝夜三極大中之矩遂使儒佛老莊混然一途語天道性命者不罔於恍惚夢幻則定以有生於無為窮高極微之論入德之途不知擇術而求多見其蔽於詖而陷於淫矣釋此允執厥中之學易之注疏也氣坱然太虛升降飛揚未嘗止息易所謂絪緼莊生所謂生物以息相吹野馬者歟此虛實動靜之機隂陽剛柔之始浮而上者陽之清降而下者隂之濁其感遇聚散為風雨為雪霜萬品之流形山川之融結糟粕煨燼無非教也釋此教雖在天地實在我豈可傳不習乎氣聚則離明得施而有形氣不聚則離明不得施而無形方其聚也安得不謂之客方其散也安得遽謂之無故聖人仰觀俯察但云知幽明之故不云知有無之故盈天地之間者法象而已文理之察非離不相覩也方其形也有以知幽之因方其不形也有以知明之故釋觀離明足以知氣虛一體故君子之學當動與天合氣之聚散於太虛猶氷凝釋於水知太虛即氣則無無故聖人語性與天道之極盡於參伍之神變易而已諸子淺妄有有無之分非窮理之學也釋學者氣能入虛則能盡性虛能實氣則能踐形凡氣清則通昏則壅清極則神故聚而有間則風行而聲聞具達清之驗與不行而至通之極與釋學者當革其舊染之汚也不然則血肉之軀焉能學貫天人由太虛有天之名由氣化有道之名合虛與氣有性之名合性與知覺有心之名釋心性道天一物也故學盡心則能知天鬼神者二氣之良能也聖者至誠得天之謂神者太虛妙應之目凡天地法象皆神化之糟粕爾釋小人學其糟粕大人學其聖神兩不立則一不可見一不可見則兩之用息兩體者虛實也動靜也聚散也清濁也其究一而已釋君子致一故能變化無窮游氣紛擾合而成質者生人物之萬殊其隂陽兩端循環不已者立天地之大義釋仁義立萬善成書夜者天之一息乎寒暑者天之晝夜乎天道春秋分而氣易猶人一寤寐而魂交魂交成夢百感紛紜對寤而言一身之晝夜也氣交為春萬物揉錯對秋而言天之晝夜也氣本之虛則湛本無形感而生則聚而有象有象斯有對對必反其為有反斯有仇仇必和而解故愛惡之情同出於太虛而卒歸於物欲倐而生忽而成不容有毫髮之間其神矣夫釋化物欲而愛善惡惡者聖人之學也故道符於天地萬物形色神之糟粕性與天道云者易而已矣心所以萬殊者感外物為不一也天大無外其為感者絪緼二端而已釋學者當存仁義仁義存則變化出矣物之所以相感者利用出入莫知其鄉一萬物之妙者與氣與志天與人有交勝之理聖人在上而下民咨氣一之動志也鳳凰儀志一之動氣也釋志氣本一物正蒙參兩第四地所以兩分剛柔男女而效之法也天所以參一太極兩儀而象之性也釋學者如蓍則能圓而神如卦則能方以智蓍似天卦似地一物兩體氣也一故神兩故化此天之所以參也釋此孔子下學上達之義地純隂凝聚於中天浮陽運旋於外此天地之常體也恆星不動純繫乎天與浮陽運旋而不窮者也日月五星逆天而行并包乎地者也地在氣中雖順天左旋其所繫辰象隨之稍遲則反移徙而右爾間有緩速不齊者七政之性殊也月隂精反乎陽者也故其右行最速日為陽精然其質本隂故其右行雖緩亦不純繫乎天如恆星不動金水附日前後進退而行者其理精深存乎物感可知矣鎮星地類然根本五行雖其行最緩亦不純繫乎地也火者亦隂質為陽萃焉然其氣比日而微故其遲倍日惟木乃歲一盛衰故歲歷一辰辰者日月一交之次有歲之象也釋此人倫有定位而健順五常無定施是以君子學其天也凡圜轉之物動必有機既謂之機則動非自外也古今謂天左旋此直至粗之論爾不考日月出沒恆星昏曉之變愚謂在天而運者惟七曜而已恆星所以為晝夜者直以地氣乘機左旋於中故使恆星河漢因一作回北為南日月因天隱見太虛無體則無以驗其遷動於外也釋君子當自强不息故貴知幾天左旋處其中者順之少遲則反右矣釋橫渠又有日月右轉之說恐異時言也地有升降日有修短地雖凝聚不散之物然二氣升降其間相從而不已也陽日上地日降而下者虛也陽日降地日進而上者盈也此一歲寒暑之候也至於一晝夜之盈虛升降則以海水潮汐驗之為信然間有小大之差則繫日月朔望其精相感釋人之寤寐語默動靜出處亦然日質本隂月質本陽故於朔望之際精魄反交則光為之食矣釋天地人事亦然虧盈法月於人為近日逺在外故月受日光常在於外人視其終初如鈎之曲及其中天也如半璧然此虧盈之驗也釋夫感婦君感臣亦是理也日月雖以形相物考其道則有施受健順之差焉星月金水受光於火日隂受而陽施也釋此本天親上本地親下之意隂陽之精互藏其宅則各得其所安故日月之形萬古不變若隂陽之氣則循環迭至聚散相蕩升降相求絪緼相揉蓋相兼相制欲一之而不能此其所以屈伸無方運行不息莫或使之不曰性命之理謂之何哉釋交感故久閏餘生於朔不盡周天之氣而世𫝊交食法與閏異術蓋有不知而作者爾隂性凝聚陽性發散隂聚之陽必散之其勢均散陽為隂纍則相持為雨而降隂為陽得則飄揚為雲而升故雲物班布太虛者隂為風驅斂聚而未散者也凡隂氣凝聚陽在內者不得出則奮擊而為雷霆陽在外者不得入則周旋不舍而為風其聚有逺近虛實故雷風有小大暴緩和而散則為霜雪雨露不和而散則為戾氣曀霾隂常散緩受交於陽則風雨調寒暑正釋此於風雨雷霆霜雪之說甚明白矣火日外光能直而施金水內光能闢而受受者隨材各得施者所應無窮神與形天與地之道歟釋故君子窮神而知天木曰曲直能既曲而反伸也金曰從革一從革而不能自反也水火氣也故炎上潤下與隂陽升降土不得而制焉木金者土之華實也其性有水火之雜故木之為物水漬則生火然而不離也蓋得土之浮華於水火之交也金之為物得火之精於土之燥得水之精於土之濡故水火相待而不相害鑠之反流而不耗蓋得土之精實於水火之際也土者物之所以成始而成終也地之質也化之終也水火之所以升降物兼體而不遺者也釋此說五行以水火屬天金木屬地則土甚明白矣正蒙天道第五天道四時行百物生無非至教聖人之動無非至德夫何言哉釋故君子不動而敬不言而信天體物不遺猶仁體事無不在也禮儀三百威儀三千無一物而非仁也昊天曰明及爾出王昊天曰且及爾游衍無一物之不體也釋故至誠能配天仁人能事天上天之載有感必通聖人之為得為而為之也釋惟至誠故天與聖人皆能妙應物之感天之知物不以耳目心思然知之之理過於耳目心思天視聽以民明威以民故詩書所謂帝天之命主於民心而已焉釋民外無天天外無民神而明之存乎其人不知上天之載當存文王默而成之存乎德行學者常存德性則自然默成而信矣存文王則知天載之神存衆人則知物性之神釋衆人文王與天一也觀衆人於文王觀文王於天觀天於已谷之神也有限故不通天下之聲聖人之神惟天故能周萬物而知釋聖人如太虛故不與谷神同聖人有感無隱正猶天道之神釋天地聖人惟虛則通形而上者得意斯得名得名斯得象不得名非得象者也故語道至於不能象則名言亡矣釋無名言處要在自得難以語人正蒙神化第六神天德化天道德其體道其用一於氣而已釋德與道無二氣故曰一隂一陽之謂道分理與氣者支離矣虛明一作靜照鑒神之明也無逺近幽深利用出入神之充塞無間也釋天能日月聖人能聰明其神一也形而上者得辭斯得象矣神為不測故緩辭不足以盡神化為難知故急辭不足以體化釋道最難言緩急形容神化見矣故君子於其言無所茍而已氣有隂陽推行有漸為化合一不測為神其在人也知義用利則神化之事備矣德盛者窮神則知不足道知化則義不足云天之化也運諸氣人之化也順夫時非氣非時則化之名何有化之實何施中庸曰至誠為能化孟子曰大而化之皆以其德合隂陽與天地同流而無不通也所謂氣也者非待其蒸鬱凝聚接於目而知之茍健順動止浩然湛然之得言皆可名之象爾然則象若非氣指何為象時若非象指何為時世人取釋氏銷礙入空學者舍惡趨善以為化此直可為始學遣纍者薄乎云爾豈天道神化所同語也哉釋時即象也象即氣也氣即神化也故君子居則觀象動則觀變故德與天地合鬼神常不死故誠不可掩人有是心在隱微必乘間而見故君子雖處幽獨防亦不懈釋心即鬼神也無人無鬼神鬼神已動善惡必露用意掩之並意亦見慎獨之語聖學之要神化者天之良能非人能故大而位天德然後能窮神知化釋學至位天德所存不可測所應為無窮大則不驕化則不吝釋大則無所不容化則無所不可無我而後大大成性而後聖聖位天德不可致知謂神故神也者聖而不可知釋聖神亦有生熟之分見幾則義明動而不括則用利屈伸順理則身安而德滋窮神知化與天為一豈有我所能勉哉乃德盛而自致爾精義入神事豫吾內求利吾外也利用安身素利吾外致養吾內也窮神知化乃養盛自致非思勉之能强故崇德而外君子未或致知也釋有致知則尚未神與化也神不可致思存焉可也化不可助長順焉可也存虛明久至德順變化達時中仁之至義之盡也知微知彰不舍而繼其善然後可以成人性矣釋成性與天命合何神不存何化不順知神而後能饗帝饗親見易而後能知神是故不聞性與天道而能制禮作樂者末矣釋帝與親神所由授也易所由行也禮樂所由出也敦厚而不化有體而無用也化而自失焉狥物而喪已也大德敦化然後仁智一而聖人之事備性性為能存神物物為能過化釋性性者盡已之性也物物者盡物之性也未有能盡已之性而不能盡物之性者也無我然後得正已之盡存神然後妙應物之感範圍天地之化而不過過則溺於空淪於靜既不能存夫神又不能知夫化矣釋不過處便可觀神化義以反經為本經正則精仁以敦化為深化行則顯義入神動一靜也仁敦化靜一動也仁敦化則無體義入神則無方釋仁義者神化之别名也何體方之有正蒙動物第七動物本諸天以呼吸為聚散之漸植物本諸地以隂陽升降為聚散之漸物之初生氣日至而滋息物生既盈氣日反而游散至之謂神以其伸也反之謂鬼以其歸也釋語默動靜死生存亡亦不得已而然乎故學貴存神氣於人生而不離死而游散者謂魂聚成形質雖死而不散者謂魄釋魂係於天魄係於地故有曰天命無曰地命海水凝則氷浮則漚然氷之才漚之性其存其亡海不得而與焉推是足以究死生之說伊川程子改與為有釋無海則亦不能為氷漚無漚氷則亦不害為海也生有先後所以為天序小大髙下相並而相形焉是謂天秩天之生物也有序物之既形也有秩知序然後經正知秩然後禮行釋經道其常禮道其變常以變運變以常生物無孤立之理非同異屈伸終始以發明之則雖物非物也事有始卒乃成非同異有無相感則不見其成不見其成則雖物非物故曰屈伸相感而利生焉釋日月之升降山川之流峙隂陽寒暑之往來其為是乎不然則不利賢才出國將昌子孫才族將大釋至誠如神者觀於此也寤形開而志交諸外也夢形閉而氣專乎內也寤所以知新於耳目夢所以緣舊於習心醫謂飢夢取飽夢與凡寤夢所感專語氣於五藏之變容有取焉爾釋高宗之夢傅說孔子之夢周公皆心藏正而諸藏隨之也聲者形氣相軋而成兩氣者谷響雷聲之類兩形者桴鼓叩擊之類形軋氣羽扇嚆矢之類氣軋形人聲笙簧之類是皆物感之良能人皆習知而不察者爾釋風雷言語皆相軋而然也其有曲折大小則存乎志焉耳故古之以道鳴者雖天地日月皆隨我矣正䝉誠明第八誠明所知乃天德良知非聞見小知而已釋此誠則明矣然亦自聞見積來天人異用不足以言誠天人異知不足以盡明所謂誠明者性與天道不見乎小大之别也釋性在我天道亦非皆在天義命合一存乎理仁智合一存乎聖動靜合一存乎神隂陽合一存乎道性與天道合一存乎誠釋理聖神誠一也性者萬物之一源非有我之得私也惟大人為能盡其道是故立必俱立知必周知愛必兼愛成不獨成彼自蔽塞而不知順吾理者則亦末如之何矣釋此亦西銘之意天能為性人能為謀大人盡性不以天能為能而以人謀為能故曰天地設位聖人成能釋此君子不謂命也天所性者通極於道氣之昏明不足以蔽之天所命者通極於性遇之吉凶不足以戕之不免乎蔽之戕之者未之學也性通乎氣之外命行乎氣之內氣無內外假有形而言爾故思知人不可不知天盡其性然後能至於命釋性命皆氣為也內外微顯一致其曰性通乎氣之外者性能帥乎氣而變化之也天性在人正猶水性之在氷凝釋雖異為物一也受光有小大昏明其照納不二也釋性無大小氣有昏明故變其氣之昏則性存性其總合兩也命其受有則也不極總之要則不至受之分盡性窮理而不可變乃吾則也天所自不能已者謂命不能無感者謂性雖然聖人猶不以所可憂而同其無憂者有相之道存乎我也釋故盡性可以立命湛一氣之本攻取氣之欲口腹於飲食鼻舌於臭味皆攻取之性也知德者屬厭而已不以嗜欲纍其心不以小害大末喪本焉爾釋養性則氣清湛道心為主也徇氣則性鑿喪人心惟危也心能盡性人能𢎞道也性不知檢其心非道𢎞人也釋心主氣血性所由生才所由出也性於人無不善繫其善反不善反而已過天地之化不善反者也命於人無不正繫其順與不順而已行險以僥幸不順命者也釋性本化也命本順也形而後有氣質之性善反之則天地之性存焉故氣質之性君子有弗性者焉釋天地之性善而已亦只在氣質之性中人之剛柔緩急有才與不才氣之偏也天本參和不偏養其氣反之本而不偏則盡性而天矣性未成則善惡混故亹亹而繼善者斯為善矣惡盡去則善因以存故舍曰善而曰成之者性釋此後天而求復先天之道德不勝氣性命於氣德勝其氣性命於德窮理盡性則性天德命天理氣之不可變者獨死生修夭而已故論死生則曰有命以言其氣也語富貴則曰在天以言其理也此大德所以必受命易簡理得而成位乎天地之中也所謂天理也者能悅諸心能通天下之志之理也能使天下悅且通則天下必歸焉不歸焉者所乘所遇之不同如仲尼與繼世之君也舜禹有天下而不與焉者正謂天理馴致非氣禀當然非志意所與也必曰舜禹云者餘非乘勢則求焉者也釋惟大德為能知性命故程子曰盡性便可至命利者為神滯者為物是故風雷有象不速於心心禦見聞不𢎞於性釋性通則耳目自靈心竅自開不疾而速風雷不足以喻之矣在帝左右察天理而左右也天理者時義而已君子教人舉天理以示之而已其行已也述天理而措之釋時義通乎人已和樂道之端乎和則可大樂則可久天地之性久大而已矣莫非天也陽明勝則德性用隂濁勝則物欲行領惡而全好者其必由學乎釋親賢友善則道明正蒙大心第九大其心則能體天下之物物有未體則心為有外世人之心止於聞見之狹聖人盡性不以見聞梏其心其視天下無一物非我孟子謂盡心則知性知天以此天大無外故有外之心不足以合天心見聞之知乃物交而知非德性所知德性所知不萌於見聞釋心盡亦由多見多聞中來但不溺於見聞則知天人謂已有知由耳目有受也人之有受由內外之合也知合內外於耳目之外則其知也過人逺矣釋耳目之外者心與天也其內亦通於心天之明莫大於日故有目接之不知其幾萬里之高也天之聲莫大於雷霆故有耳屬之莫知其幾萬里之逺也天之不禦莫大於太虛故心知廓之莫究其極也人病以其耳目見聞纍其心而不務盡其心故思盡其心者必知心所從來而後能釋心自太虛來故與太虛同耳目皆白是通焉耳體物體身道之本也身而體道其為人也大矣道能物身故大不能物身而纍於身則藐乎其卑矣能以天體身則能體物也不疑釋係自處大小如何大則天小則物成心忘然後可與進於道成心者私意也化則無成心矣成心者意之謂與釋成心者因心所欲而遂成之也即人心惟危以我視物則我大以道體物我則道大故君子之大也大於道大於我者容不免狂而已釋病起白是道進自虛釋氏不知天命而以心法起滅天地以小緣大以末緣本其不能窮而謂之幻妄真所謂疑氷者歟釋只是淫蔽釋氏妄意天性而不知範圍天用反以六根之微因緣天地明不能盡則誣天地日月為幻妄蔽其用於一身之小溺其志於虛空之大此所以語大語小流遁失中其過於大也塵芥六合其蔽於小也夢幻人世謂之窮理可乎不知窮理而謂盡性可乎謂之無不知可乎塵芥六合謂天地為有窮也夢幻人世明不能究所從也釋釋氏只欲自生不管人故輒自是不求人張子抄釋卷一
